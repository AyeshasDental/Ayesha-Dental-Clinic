<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, onValue, set, get } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

// ─────────────────────────────────────────────────────────────────────────────
// FIREBASE CONFIG — Replace these values with your own Firebase project config
// Instructions to get these values are at the bottom of this file
// ─────────────────────────────────────────────────────────────────────────────
const FIREBASE_CONFIG = {
  apiKey:            "AIzaSyBW5cg6Q8KgpArkSxu5jAD8A1DnVgZNE2Q",
  authDomain:        "ayesha-dental-clinicmanagement.firebaseapp.com",
  databaseURL:       "https://ayesha-dental-clinicmanagement-default-rtdb.firebaseio.com",
  projectId:         "ayesha-dental-clinicmanagement",
  storageBucket:     "ayesha-dental-clinicmanagement.firebasestorage.app",
  messagingSenderId: "1074338883048",
  appId:             "1:1074338883048:web:fbd285c3f04cd3e9da705d"
};

const FB_PATH = "adc/v1";
let db;

try {
  const app = initializeApp(FIREBASE_CONFIG);
  db = getDatabase(app);
  console.log("✅ Firebase initialized successfully");
} catch(e) {
  console.error("❌ Firebase init failed:", e.message);
}

window.__fb = {
  enabled: true,

  async load() {
    try {
      const snap = await get(ref(db, FB_PATH));
      console.log("📥 Firebase load:", snap.exists() ? "data found" : "empty");
      return snap.exists() ? snap.val() : null;
    } catch(e) {
      console.error("FB load error:", e);
      return null;
    }
  },

  async save(data) {
    try {
      await set(ref(db, FB_PATH), data);
    } catch(e) {
      console.error("FB save error:", e);
    }
  },

  subscribe(callback) {
    const unsubscribe = onValue(ref(db, FB_PATH), snap => {
      if(snap.exists()) callback(snap.val());
    }, err => {
      console.error("FB subscribe error:", err);
    });
    return unsubscribe;
  }
};
</script>

/* Print styles */
@media print{

}

/* ── MOBILE DRAWER — hidden off-screen by default on ALL screen sizes ── */
/* On desktop it simply never becomes visible (display:none on desktop) */
.sidebar-mobile{
  display:none;             /* hidden on desktop */
  position:fixed;left:0;top:0;bottom:0;width:240px;z-index:300;

  flex-direction:column;height:100vh;overflow-y:auto;

}
.sidebar-mobile.open{transform:translateX(0)}

/* ── OVERLAY — hidden on desktop ── */
.mob-overlay{
  display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);
  z-index:200;opacity:0;transition:opacity .22s;pointer-events:none
}
.mob-overlay.open{opacity:1;pointer-events:auto}

/* ── BOTTOM NAV — hidden on desktop ── */
.bottom-nav{display:none;position:fixed;bottom:0;left:0;right:0;z-index:150;background:#070f1a;border-top:1px solid #1e3650;padding:0;height:58px;align-items:stretch}

.bottom-nav-item.active{color:#4a90d9}
.bottom-nav-item svg{flex-shrink:0}
.bnav-more{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;border:none;background:none;color:#4a7090;cursor:pointer;font-size:.6rem;font-weight:600;padding:4px 2px;-webkit-tap-highlight-color:transparent}

/* ── MOBILE HEADER — hidden on desktop ── */
.mob-header{display:none;align-items:center;justify-content:space-between;padding:.7rem 1rem;background:#070f1a;border-bottom:1px solid #1e3650;position:sticky;top:0;z-index:100;height:52px;flex-shrink:0}

/* ── RESPONSIVE MEDIA QUERIES ── */
@media(max-width:768px){
  /* Show mobile chrome */
  .mob-header{display:flex}
  .bottom-nav{display:flex}
  .mob-overlay{display:block}

  /* Show the mobile drawer (still off-screen until .open) */
  .sidebar-mobile{display:flex}

  /* Hide desktop sidebar */
  .sidebar-desktop{display:none!important}

  /* Toast above bottom nav */
  #toast{bottom:70px}

  /* Main content fills screen, padded for bottom nav */
  .main-content{
    padding:.9rem .9rem 72px!important;
    max-height:unset!important;
    overflow-y:auto!important
  }

  /* Responsive grids */
  .grid-4{grid-template-columns:1fr 1fr!important}
  .grid-3{grid-template-columns:1fr 1fr!important}
  .grid-2{grid-template-columns:1fr!important}
  .grid-chart{grid-template-columns:1fr!important}
  .grid-auto{grid-template-columns:1fr!important}
  .hide-mobile{display:none!important}

  /* Modals full-screen on mobile */
  .modal-box{max-width:100%!important;max-height:100vh!important;border-radius:18px 18px 0 0!important;margin-top:auto}
  .modal-wrap{align-items:flex-end!important;padding:0!important}

  /* Stat cards smaller text */
  .stat-value{font-size:1.1rem!important}

  /* Card list items stack better */
  .card-row{flex-direction:column!important;align-items:flex-start!important;gap:.6rem!important}

  /* Tables scroll horizontally */
  .table-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch}

  /* Form inputs full width */
  .form-grid{grid-template-columns:1fr!important}

  /* Line items compact on mobile */
  .lineitems-grid{grid-template-columns:2fr 1fr 1fr 1fr 24px!important}
}

@media(max-width:400px){

  async load() {

      const snap = await get(ref(db, FB_PATH));
      console.log("📥 Firebase load:", snap.exists() ? "data found" : "empty");
      return snap.exists() ? snap.val() : null;
    } catch(e) {
      console.error("FB load error:", e);
      return null;
    }
  },

  async save(data) {
    try {
      await set(ref(db, FB_PATH), data);
    } catch(e) {
      console.error("FB save error:", e);
    }
  },

  subscribe(callback) {

      console.error("FB subscribe error:", err);
    });
    return unsubscribe;
  }

  }

  .lineitems-grid{grid-template-columns:2fr 1fr 1fr 1fr 24px!important}
}

</style>

// PRINT ENGINE — uses hidden iframe to avoid popup blockers
// ═══════════════════════════════════════════════════════════════════════════════
function doPrint(htmlContent){
  const frame=document.getElementById('print-frame');
  const doc=frame.contentDocument||frame.contentWindow.document;
  doc.open();
  doc.write(htmlContent);
  doc.close();
  // Wait for images to load then print
  frame.contentWindow.onload=()=>{
    setTimeout(()=>frame.contentWindow.print(),400);
  };
  setTimeout(()=>frame.contentWindow.print(),800);
}

function buildPrintHtml(type,doc,db){
  const s=db.settings||SEED.settings;
  const ac=s.invoiceColor||'#1565a0';
  const layout=type==='receipt'?s.receiptLayout:s.invoiceLayout;
  const footer=type==='receipt'?s.receiptFooter:s.invoiceFooter;
  const pt=db.patients?.find(p=>p.id===doc.patientId);
  const sp=db.suppliers?.find(x=>x.id===doc.supplierId);
  const dr=db.doctors?.find(d=>d.id===doc.doctorId);
  const entity=pt||sp;

  const logoHtml=s.showLogoOnDocs&&s.logo
    ?`<img src="${s.logo}" style="height:55px;object-fit:contain;border-radius:6px"/>`
    :`<div style="width:55px;height:55px;background:${ac};border-radius:10px;display:inline-flex;align-items:center;justify-content:center;color:white;font-size:22px;font-weight:bold;font-family:Georgia,serif">${(s.clinicName||'A').charAt(0)}</div>`;

  const css=`*{box-sizing:border-box;margin:0;padding:0}body{font-family:Georgia,serif;color:#111;background:#fff}
    table{width:100%;border-collapse:collapse;margin:14px 0}
    th{background:#f0f5fb;padding:8px 11px;text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:#444;border-bottom:2px solid #dde5ef}
    td{padding:8px 11px;border-bottom:1px solid #edf1f6;font-size:13px}
    .amt{text-align:right}.tr-total td{font-weight:700;font-size:14px;background:#f8fbff;border-top:2px solid #ccd5e0}
    .footer{margin-top:40px;text-align:center;color:#888;font-size:11px;border-top:1px solid #e0e5ea;padding-top:14px}
    .badge-paid,.badge-partial,.badge-unpaid{padding:2px 10px;border-radius:12px;font-size:11px;font-weight:700}
    .badge-paid{color:#1a7340;background:#e0f4ea}.badge-partial{color:#7a4d00;background:#fff3e0}.badge-unpaid{color:#8b0000;background:#fde8e8}
    @media print{body{padding:0!important}.no-print{display:none}}`;

  let billToHtml='';
  if(entity) billToHtml=`<div style="margin-bottom:18px;padding:12px 14px;background:#f8f9fb;border-radius:8px;font-size:13px"><strong>${type==='bill'?'Supplier':'Bill To'}:</strong><br/><strong style="font-size:15px">${entity.name||'—'}</strong>${entity.phone?`<br/>${entity.phone}`:''}${entity.address?`<br/>${entity.address}`:''}${dr?`<br/>Doctor: ${dr.name}`:''}</div>`;

  let itemsHtml='';
  if(doc.items?.length){
    itemsHtml=`<table><thead><tr><th>#</th><th>Description</th><th>Qty</th><th>Rate</th><th class="amt">Amount</th></tr></thead><tbody>
      ${doc.items.map((it,i)=>`<tr><td>${i+1}</td><td>${it.desc||''}</td><td>${it.qty}</td><td>${fmtPKR(it.rate)}</td><td class="amt"><strong>${fmtPKR(Number(it.qty)*Number(it.rate))}</strong></td></tr>`).join('')}
    </tbody></table>`;
  }

  let totalsHtml='';
  if(doc.amount!=null){
    totalsHtml=`<div style="border:2px solid #111;border-radius:10px;padding:20px;text-align:center;margin:18px 0"><div style="font-size:32px;font-weight:800;color:#1a7340;font-family:Georgia,serif">${fmtPKR(doc.amount)}</div><div style="color:#555;margin-top:4px;font-size:13px">Amount Received · ${doc.method||''}</div></div>`;
  } else if(doc.total!=null){
    const bal=doc.total-(doc.paid||0);
    totalsHtml=`<div style="display:flex;justify-content:flex-end;margin-top:8px"><table style="width:260px;margin:0"><tbody>
      ${doc.subtotal!=null?`<tr><td>Subtotal</td><td class="amt">${fmtPKR(doc.subtotal)}</td></tr>`:''}
      ${doc.tax?`<tr><td>${s.taxLabel||'Tax'}</td><td class="amt">${fmtPKR(doc.tax)}</td></tr>`:''}
      ${doc.discount?`<tr><td>Discount</td><td class="amt">- ${fmtPKR(doc.discount)}</td></tr>`:''}
      <tr class="tr-total"><td>TOTAL</td><td class="amt">${fmtPKR(doc.total)}</td></tr>
      ${doc.paid!=null?`<tr><td>Paid</td><td class="amt" style="color:#1a7340"><strong>${fmtPKR(doc.paid)}</strong></td></tr>`:''}
      ${bal>0?`<tr class="tr-total"><td>Balance Due</td><td class="amt" style="color:#8b0000">${fmtPKR(bal)}</td></tr>`:''}
    </tbody></table></div>`;
  }

  let paymentsHtml='';
  if(doc.payments?.length){
    paymentsHtml=`<div style="margin-top:18px"><div style="font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:#666;margin-bottom:6px;font-weight:700">Payment History</div>
      <table><thead><tr><th>Date</th><th>Method</th><th>Note</th><th class="amt">Amount</th></tr></thead><tbody>
      ${doc.payments.map(p=>`<tr><td>${p.date}</td><td>${p.method}</td><td>${p.note||'—'}</td><td class="amt" style="color:#1a7340;font-weight:700">${fmtPKR(p.amount)}</td></tr>`).join('')}
      </tbody></table></div>`;
  }

  const headerClinic=`<div style="display:flex;gap:14px;align-items:center">${logoHtml}<div>
    <div style="font-size:21px;font-weight:bold;color:${ac};font-family:Georgia,serif">${s.clinicName||''}</div>
    ${s.tagline?`<div style="color:#666;font-size:12px">${s.tagline}</div>`:''}
    <div style="color:#666;font-size:12px">${[s.phone,s.email].filter(Boolean).join(' · ')}</div>
    ${s.address?`<div style="color:#666;font-size:12px">${s.address}</div>`:''}
  </div></div>`;

  const headerDoc=`<div style="text-align:right">
    <div style="font-size:26px;font-weight:800;color:${ac};font-family:Georgia,serif">${doc.id||type.toUpperCase()}</div>
    <div style="color:#666;font-size:12px;margin-top:3px">Date: ${doc.date}</div>
    ${doc.dueDate?`<div style="color:#666;font-size:12px">Due: ${doc.dueDate}</div>`:''}
    ${doc.status?`<div style="margin-top:6px"><span class="badge-${doc.status}">${doc.status}</span></div>`:''}
  </div>`;

  let body='';
  if(layout==='modern'){
    body=`<div style="background:${ac};color:white;padding:24px 32px;display:flex;justify-content:space-between;align-items:center">
      ${s.showLogoOnDocs&&s.logo?`<img src="${s.logo}" style="height:44px;object-fit:contain;border-radius:6px;background:white;padding:3px"/>`:``}
      <div><div style="font-size:19px;font-weight:bold">${s.clinicName}</div><div style="opacity:.8;font-size:11px">${s.address||''}</div></div>
      <div style="text-align:right"><div style="font-size:26px;font-weight:800;opacity:.9">${doc.id||''}</div><div style="opacity:.8;font-size:11px">Date: ${doc.date}</div></div>
    </div>
    <div style="padding:24px 32px">${billToHtml}${itemsHtml}${totalsHtml}${paymentsHtml}${doc.notes?`<p style="color:#555;font-size:12px;margin-top:12px">Notes: ${doc.notes}</p>`:''}</div>`;
  } else if(layout==='minimal'){
    body=`<div style="padding:28px;max-width:620px;margin:auto"><div style="margin-bottom:18px"><div style="font-size:17px;font-weight:bold">${s.clinicName}</div><div style="color:#666;font-size:11px">${s.address||''}</div></div>
    <div style="display:flex;justify-content:space-between;border-bottom:2px solid #111;padding-bottom:12px;margin-bottom:18px">
      <div style="font-size:22px;font-weight:800">${type.toUpperCase()}</div>
      <div style="font-size:12px;color:#555"><div>${doc.id||''}</div><div>Date: ${doc.date}</div></div>
    </div>${billToHtml}${itemsHtml}${totalsHtml}${paymentsHtml}</div>`;
  } else {
    // classic
    body=`<div style="padding:28px">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:20px;padding-bottom:16px;border-bottom:3px solid ${ac}">${headerClinic}${headerDoc}</div>
      ${billToHtml}${itemsHtml}${totalsHtml}${paymentsHtml}
      ${doc.notes?`<p style="color:#555;font-size:12px;margin-top:12px">Notes: ${doc.notes}</p>`:''}
    </div>`;
  }

  return `<!DOCTYPE html><html><head><meta charset="UTF-8"/><title>${type} ${doc.id||''}</title><style>${css}</style></head><body>
    ${body}
    <div class="footer" style="padding:14px 28px 28px">${footer||''}<br/>Generated on ${new Date().toLocaleString()}</div>
  </body></html>`;
}

function printDoc(type,doc,db){
  doPrint(buildPrintHtml(type,doc,db));
}

    </tbody></table>

function printPLReport(db){
  const s=db.settings||SEED.settings;
  const ac=s.invoiceColor||'#1565a0';
  const rev=db.invoices.reduce((a,i)=>a+i.paid,0);
  const cogs=db.bills.reduce((a,b)=>a+b.paid,0);
  const opex=db.expenses.reduce((a,e)=>a+e.amount,0);

// LINE ITEMS

const LineItems=({items,setItems})=>{
  const upd=(i,f,v)=>{const a=[...items];const qty=f==='qty'?Number(v):Number(a[i].qty);const rate=f==='rate'?Number(v):Number(a[i].rate);a[i]={...a[i],[f]:f==='qty'||f==='rate'?Number(v):v,amount:qty*rate};setItems(a);};
  const total=items.reduce((a,x)=>a+(Number(x.qty)*Number(x.rate)||0),0);
  return(<div style={{marginBottom:'1rem'}}>
    <div style={{display:'grid',gridTemplateColumns:'3fr 1fr 1.2fr 1.2fr 26px',gap:5,marginBottom:5}}>
      {['Description','Qty','Rate','Amount',''].map(h=><div key={h} style={{color:'#4a7090',fontSize:'.67rem',textTransform:'uppercase',letterSpacing:'.06em'}}>{h}</div>)}
    </div>
    {items.map((it,i)=>(
      <div key={i} style={{display:'grid',gridTemplateColumns:'3fr 1fr 1.2fr 1.2fr 26px',gap:5,marginBottom:5}}>
        <input value={it.desc||''} onChange={e=>upd(i,'desc',e.target.value)} placeholder="Description" style={{background:'#060c16',border:'1px solid #1e3650',borderRadius:7,padding:'.4rem .62rem',color:'#e0f0fc',fontSize:'.83rem',outline:'none'}}/>
        <input type="number" value={it.qty} onChange={e=>upd(i,'qty',e.target.value)} style={{background:'#060c16',border:'1px solid #1e3650',borderRadius:7,padding:'.4rem .4rem',color:'#e0f0fc',fontSize:'.83rem',outline:'none',textAlign:'center'}}/>
        <input type="number" value={it.rate} onChange={e=>upd(i,'rate',e.target.value)} style={{background:'#060c16',border:'1px solid #1e3650',borderRadius:7,padding:'.4rem .4rem',color:'#e0f0fc',fontSize:'.83rem',outline:'none'}}/>
        <div style={{background:'#060c16',border:'1px solid #1e3650',borderRadius:7,padding:'.4rem .4rem',color:'#38c878',fontSize:'.83rem',display:'flex',alignItems:'center'}}>{fmtPKR(Number(it.qty)*Number(it.rate))}</div>
        <button onClick={()=>setItems(items.filter((_,j)=>j!==i))} style={{background:'none',border:'none',color:'#502020',cursor:'pointer',padding:2,display:'flex',alignItems:'center'}}><Icon n="trash" s={13}/></button>
      </div>
    ))}
    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginTop:8}}>
      <Btn sm ghost icon="plus" onClick={()=>setItems([...items,{desc:'',qty:1,rate:0,amount:0}])}>Add Line</Btn>

};

const PayModal=({doc,docType,onSave,onClose})=>{
  const bal=doc.total-(doc.paid||0);
  const[amt,setAmt]=useState(String(bal));
  const[method,setMethod]=useState('Cash');
  const[date,setDate]=useState(today());
  const[note,setNote]=useState('');
  const go=()=>{const a=Number(amt);if(!a||a<=0)return;const newPaid=Math.min((doc.paid||0)+a,doc.total);const status=newPaid>=doc.total?'paid':'partial';const payment={id:uid('PAY'),date,amount:a,method,note};onSave({...doc,paid:newPaid,status,payments:[...(doc.payments||[]),payment]});};
  return(<Modal title={`Record Payment — ${doc.id}`} onClose={onClose}>
    <div style={{background:'#06101a',border:'1px solid #1e3650',borderRadius:12,padding:'1rem',marginBottom:'1.1rem',display:'grid',gridTemplateColumns:'1fr 1fr',gap:'.5rem'}}>

      ?<div style={{color:'#38c878',textAlign:'center',padding:'1rem',background:'#0b3a22',borderRadius:10}}>✓ Fully paid.</div>

        <FI label="Payment Date" type="date" value={date} onChange={setDate}/>

};

          <div style={{width:70,height:70,borderRadius:'50%',background:'linear-gradient(135deg,#14508a,#0c3060)',display:'flex',alignItems:'center',justifyContent:'center',color:'#fff',fontWeight:700,fontSize:'1.55rem',flexShrink:0}}>{vp.name.charAt(0)}</div>}
        <div><h3 style={{margin:'0 0 3px',color:'#e0f0fc',fontSize:'1.15rem',fontFamily:"'Cormorant Garamond',serif"}}>{vp.name}</h3>
        <div style={{color:'#4a7090',fontSize:'.78rem'}}>{vp.phone} · {vp.email||'—'} · {vp.bloodGroup||'—'}</div>

          db.history.filter(h=>h.patientId===vp.id).map(h=><div key={h.id} style={{background:'#060c16',border:'1px solid #1e3650',borderRadius:8,padding:'.52rem .72rem',marginBottom:5}}><div style={{color:'#e0f0fc',fontSize:'.82rem',fontWeight:600}}>{h.treatment}</div><div style={{color:'#4a7090',fontSize:'.7rem'}}>{h.date} · {fmtPKR(h.fee)}</div></div>)}</div>

          db.appointments.filter(a=>a.patientId===vp.id&&a.status==='scheduled').map(a=><div key={a.id} style={{background:'#060c16',border:'1px solid #1e3650',borderRadius:8,padding:'.52rem .72rem',marginBottom:5}}><div style={{color:'#e0f0fc',fontSize:'.82rem',fontWeight:600}}>{a.treatment}</div><div style={{color:'#4a7090',fontSize:'.7rem'}}>{a.date} {a.time}</div></div>)}</div>
      </div>
    </Modal>}
  </div>);
};

// APPOINTMENTS
// ═══════════════════════════════════════════════════════════════════════════════
const Appointments=({db,setDb,can})=>{
  const[modal,setModal]=useState(false);const[editId,setEditId]=useState(null);
  const[fd,setFd]=useState(today());const[fdr,setFdr]=useState('');
  const blank={patientId:'',doctorId:'',date:today(),time:'09:00',duration:30,treatment:'',status:'scheduled',notes:''};
  const[form,setForm]=useState(blank);
  const filtered=[...db.appointments].filter(a=>(fd?a.date===fd:true)&&(fdr?a.doctorId===Number(fdr):true)).sort((a,b)=>a.time.localeCompare(b.time));
  const save=()=>{if(!form.patientId||!form.treatment)return;const d={...form,patientId:Number(form.patientId),doctorId:Number(form.doctorId),duration:Number(form.duration)};if(editId)setDb(x=>({...x,appointments:x.appointments.map(a=>a.id===editId?{...d,id:editId}:a)}));else setDb(x=>({...x,appointments:[...x.appointments,{...d,id:Date.now()}]}));setModal(false);setForm(blank);setEditId(null);};
  const del=id=>{if(window.confirm('Delete?'))setDb(x=>({...x,appointments:x.appointments.filter(a=>a.id!==id)}));};
  const slots=['08:00','08:30','09:00','09:30','10:00','10:30','11:00','11:30','12:00','12:30','13:00','13:30','14:00','14:30','15:00','15:30','16:00','16:30','17:00'];
  return(<div>
    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'1.1rem'}}>
      <h2 style={{fontFamily:"'Cormorant Garamond',serif",fontSize:'1.55rem',color:'#e0f0fc',margin:0}}>Appointments</h2>
      {can('edit_appointments')&&<Btn icon="plus" onClick={()=>{setForm(blank);setEditId(null);setModal(true)}}>Schedule</Btn>}
    </div>
    <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'.65rem',marginBottom:'1rem'}}>
      <FI type="date" value={fd} onChange={setFd}/>
      <FS value={fdr} onChange={setFdr} options={[{value:'',label:'All Doctors'},...db.doctors.map(d=>({value:String(d.id),label:d.name}))]}/>
    </div>
    <div style={{display:'grid',gap:'.52rem'}}>
      {filtered.map(a=>{const pt=db.patients.find(p=>p.id===a.patientId);const dr=db.doctors.find(d=>d.id===a.doctorId);return(
        <Card key={a.id} style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
          <div style={{display:'flex',gap:'.85rem',alignItems:'center'}}>
            <div style={{textAlign:'center',minWidth:48,background:'#060c16',borderRadius:9,padding:'.32rem'}}>
              <div style={{color:'#4a90d9',fontSize:'.98rem',fontWeight:800,fontFamily:"'Cormorant Garamond',serif",lineHeight:1}}>{a.time}</div>
              <div style={{color:'#2e4a60',fontSize:'.6rem'}}>{a.duration}m</div>
            </div>
            <div><div style={{color:'#e0f0fc',fontWeight:600}}>{pt?.name||'—'}</div><div style={{color:'#4a7090',fontSize:'.73rem'}}>{a.treatment} · {dr?.name||'—'}</div></div>
          </div>
          <div style={{display:'flex',gap:'.38rem',alignItems:'center'}}>
            <Badge status={a.status}/>
            {can('edit_appointments')&&<>
              {a.status==='scheduled'&&<Btn sm ghost onClick={()=>setDb(x=>({...x,appointments:x.appointments.map(ap=>ap.id===a.id?{...ap,status:'completed'}:ap)}))}><Icon n="check" s={12}/></Btn>}
              <Btn sm ghost icon="edit" onClick={()=>{setForm({...a,patientId:String(a.patientId),doctorId:String(a.doctorId)});setEditId(a.id);setModal(true);}}/>
              <Btn sm ghost icon="trash" danger onClick={()=>del(a.id)}/>
            </>}
          </div>
        </Card>);})}
      {filtered.length===0&&<div style={{color:'#2e4a60',textAlign:'center',padding:'3rem'}}>No appointments for this filter.</div>}
    </div>
    {modal&&<Modal title={editId?'Edit Appointment':'New Appointment'} onClose={()=>{setModal(false);setEditId(null);setForm(blank)}}>
      <FS label="Patient" value={form.patientId} onChange={v=>setForm(f=>({...f,patientId:v}))} options={[{value:'',label:'Select Patient…'},...db.patients.map(p=>({value:String(p.id),label:p.name}))]}/>
      <G2><FS label="Doctor" value={form.doctorId} onChange={v=>setForm(f=>({...f,doctorId:v}))} options={[{value:'',label:'Select Doctor…'},...db.doctors.map(d=>({value:String(d.id),label:d.name}))]}/>
        <FI label="Date" type="date" value={form.date} onChange={v=>setForm(f=>({...f,date:v}))}/>
        <FS label="Time" value={form.time} onChange={v=>setForm(f=>({...f,time:v}))} options={slots}/>
        <FI label="Duration (min)" type="number" value={form.duration} onChange={v=>setForm(f=>({...f,duration:v}))}/>
      </G2>
      <FI label="Treatment / Reason" value={form.treatment} onChange={v=>setForm(f=>({...f,treatment:v}))} required/>
      <FS label="Status" value={form.status} onChange={v=>setForm(f=>({...f,status:v}))} options={['scheduled','completed','cancelled']}/>
      <FTA label="Notes" value={form.notes} onChange={v=>setForm(f=>({...f,notes:v}))} rows={2}/>
      <Btn full onClick={save}>{editId?'Update':'Schedule'}</Btn>
    </Modal>}
  </div>);
};

// PRESCRIPTIONS
// ═══════════════════════════════════════════════════════════════════════════════
const Prescriptions=({db,setDb,can})=>{
  const[modal,setModal]=useState(false);const[viewRx,setViewRx]=useState(null);const[editId,setEditId]=useState(null);const[fp,setFp]=useState('');
  const blank={patientId:'',doctorId:'',date:today(),notes:'',nextVisit:'',meds:[{name:'',dose:'',frequency:'',duration:''}]};
  const[form,setForm]=useState(blank);
  const filtered=fp?db.prescriptions.filter(r=>r.patientId===Number(fp)):db.prescriptions;
  const updMed=(i,f,v)=>{const m=[...form.meds];m[i]={...m[i],[f]:v};setForm(x=>({...x,meds:m}));};
  const save=()=>{if(!form.patientId||!form.meds[0].name)return;const d={...form,patientId:Number(form.patientId),doctorId:Number(form.doctorId),medications:form.meds};if(editId)setDb(x=>({...x,prescriptions:x.prescriptions.map(r=>r.id===editId?{...d,id:editId}:r)}));else setDb(x=>({...x,prescriptions:[...x.prescriptions,{...d,id:Date.now()}]}));setModal(false);setForm(blank);setEditId(null);};
  const del=id=>{if(window.confirm('Delete?'))setDb(x=>({...x,prescriptions:x.prescriptions.filter(r=>r.id!==id)}));};
  return(<div>
    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'1.1rem'}}>
      <h2 style={{fontFamily:"'Cormorant Garamond',serif",fontSize:'1.55rem',color:'#e0f0fc',margin:0}}>Prescriptions</h2>
      {can('edit_prescriptions')&&<Btn icon="plus" onClick={()=>{setForm(blank);setEditId(null);setModal(true)}}>New Rx</Btn>}
    </div>
    <FS value={fp} onChange={setFp} options={[{value:'',label:'All Patients'},...db.patients.map(p=>({value:String(p.id),label:p.name}))]}/>
    <div style={{display:'grid',gap:'.52rem'}}>
      {[...filtered].reverse().map(rx=>{const pt=db.patients.find(p=>p.id===rx.patientId);return(
        <Card key={rx.id} onClick={()=>setViewRx(rx)}>
          <div style={{display:'flex',justifyContent:'space-between',marginBottom:5}}>
            <div><span style={{color:'#4a90d9',fontWeight:700}}>{pt?.name||'—'}</span><span style={{color:'#2e4a60',fontSize:'.74rem',marginLeft:'.6rem'}}>{rx.date}</span></div>
            <div style={{display:'flex',gap:'.35rem'}} onClick={e=>{e.stopPropagation();}}>
              <Btn sm ghost icon="print" onClick={()=>printPrescription(rx,db)}>Print</Btn>
              {can('edit_prescriptions')&&<><Btn sm ghost icon="edit" onClick={()=>{setForm({...rx,patientId:String(rx.patientId),doctorId:String(rx.doctorId),meds:rx.medications});setEditId(rx.id);setModal(true);}}/><Btn sm ghost icon="trash" danger onClick={()=>del(rx.id)}/></>}
            </div>
          </div>
          <div style={{display:'flex',gap:'.32rem',flexWrap:'wrap'}}>
            {rx.medications.map((m,i)=><span key={i} style={{background:'#0d1e2c',border:'1px solid #1e3650',borderRadius:5,padding:'1px 7px',color:'#7ab0d4',fontSize:'.7rem'}}>{m.name} {m.dose}</span>)}
          </div>
        </Card>);})}
    </div>
    {viewRx&&<Modal title="Prescription Details" onClose={()=>setViewRx(null)}>
      {(()=>{const pt=db.patients.find(p=>p.id===viewRx.patientId);const dr=db.doctors.find(d=>d.id===viewRx.doctorId);return(<>
        <G2 style={{marginBottom:'1rem'}}>{[['Patient',pt?.name||'—'],['Doctor',dr?.name||'—'],['Date',viewRx.date],['Next Visit',viewRx.nextVisit||'—']].map(([k,v])=>(
          <div key={k} style={{background:'#060c16',borderRadius:8,padding:'.5rem .72rem'}}><div style={{color:'#2e4a60',fontSize:'.66rem',textTransform:'uppercase',marginBottom:2}}>{k}</div><div style={{color:'#e0f0fc',fontWeight:600,fontSize:'.84rem'}}>{v}</div></div>
        ))}</G2>
        <div style={{background:'#060c16',border:'1px solid #1e3650',borderRadius:10,padding:'1rem',marginBottom:'1rem'}}>
          <div style={{color:'#2e4a60',fontSize:'.66rem',textTransform:'uppercase',marginBottom:8}}>Medications</div>
          {viewRx.medications.map((m,i)=><div key={i} style={{display:'grid',gridTemplateColumns:'2fr 1fr 1.5fr 1fr',gap:'.4rem',marginBottom:5,alignItems:'center'}}><span style={{color:'#e0f0fc',fontWeight:600,fontSize:'.84rem'}}>{m.name}</span><span style={{color:'#7ab0d4',fontSize:'.82rem'}}>{m.dose}</span><span style={{color:'#4a7090',fontSize:'.76rem'}}>{m.frequency}</span><span style={{color:'#2e4a60',fontSize:'.76rem'}}>{m.duration}</span></div>)}
        </div>
        {viewRx.notes&&<div style={{color:'#4a7090',fontSize:'.82rem',marginBottom:'1rem'}}>{viewRx.notes}</div>}
        <Btn full icon="print" onClick={()=>printPrescription(viewRx,db)}>Print Prescription</Btn>
      </>)})()}
    </Modal>}
    {modal&&<Modal title={editId?'Edit Rx':'Write Prescription'} onClose={()=>{setModal(false);setEditId(null);setForm(blank)}}>
      <FS label="Patient" value={form.patientId} onChange={v=>setForm(f=>({...f,patientId:v}))} options={[{value:'',label:'Select Patient…'},...db.patients.map(p=>({value:String(p.id),label:p.name}))]}/>
      <FS label="Doctor" value={form.doctorId} onChange={v=>setForm(f=>({...f,doctorId:v}))} options={[{value:'',label:'Select Doctor…'},...db.doctors.map(d=>({value:String(d.id),label:d.name}))]}/>
      <FI label="Date" type="date" value={form.date} onChange={v=>setForm(f=>({...f,date:v}))}/>
      <div style={{marginBottom:'1rem'}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:6}}>
          <label style={{color:'#4a7090',fontSize:'.69rem',textTransform:'uppercase',letterSpacing:'.08em'}}>Medications</label>
          <Btn sm ghost icon="plus" onClick={()=>setForm(f=>({...f,meds:[...f.meds,{name:'',dose:'',frequency:'',duration:''}]}))}>Add</Btn>
        </div>
        {form.meds.map((m,i)=>(
          <div key={i} style={{background:'#060c16',border:'1px solid #1e3650',borderRadius:8,padding:'.62rem',marginBottom:5}}>
            <div style={{display:'grid',gridTemplateColumns:'2fr 1fr 1.5fr 1fr auto',gap:5}}>

};

// ROOT APP
// ═══════════════════════════════════════════════════════════════════════════════
function App(){
  const[db,setDbRaw]=useState(()=>{try{const s=localStorage.getItem(LSKEY);return s?JSON.parse(s):SEED;}catch{return SEED;}});
  const[currentUser,setCurrentUser]=useState(null);
  const[active,setActive]=useState('dashboard');
  const[syncing,setSyncing]=useState(false);
  const[fbStatus,setFbStatus]=useState('connecting');
  const syncTimerRef=useRef(null);
  const isRemoteUpdate=useRef(false);

  // Wrap setDb to add timestamp and handle sync
  const setDb=useCallback(updFn=>{
    setDbRaw(prev=>{
      const next=typeof updFn==='function'?updFn(prev):updFn;
      const stamped={...next,_ts:Date.now()};
      localStorage.setItem(LSKEY,JSON.stringify(stamped));
      if(!isRemoteUpdate.current){
        if(syncTimerRef.current)clearTimeout(syncTimerRef.current);
        syncTimerRef.current=setTimeout(async()=>{
          setSyncing(true);
          await window.__fb?.save(stamped);
          setSyncing(false);
        },800);
      }
      return stamped;
    });
  },[]);

  useEffect(()=>{
    const init=async()=>{
      await new Promise(r=>setTimeout(r,500));
      if(!window.__fb?.enabled){setFbStatus('offline');return;}
      try{
        const remote=await window.__fb.load();
        if(remote){
          const localTs=db._ts||0;const remoteTs=remote._ts||0;
          if(remoteTs>localTs){
            isRemoteUpdate.current=true;
            setDbRaw(remote);
            localStorage.setItem(LSKEY,JSON.stringify(remote));
            isRemoteUpdate.current=false;
            showToast('☁ Data loaded from Firebase!');
          }
        } else {
          await window.__fb.save(db);
          showToast('☁ Initial data pushed to Firebase!');
        }
        setFbStatus('online');
        window.__fb.subscribe(data=>{
          isRemoteUpdate.current=true;
          setDbRaw(prev=>{
            if((data._ts||0)>(prev._ts||0)){
              localStorage.setItem(LSKEY,JSON.stringify(data));
              return data;
            }
            return prev;
          });
          setTimeout(()=>{isRemoteUpdate.current=false;},100);
        });
      }catch(e){
        console.error('Firebase connection error:',e);
        setFbStatus('offline');
        showToast('Firebase error — running offline',true);
      }
    };
    init();
  },[]);

  const[mobOpen,setMobOpen]=useState(false);
  const closeMob=()=>setMobOpen(false);
  const navTo=k=>{setActive(k);closeMob();};

  const can=useCallback(perm=>{
    if(!currentUser)return false;
    const rp=db.rolePermissions||DEFAULT_PERMS;
    return(rp[currentUser.role]||[]).includes(perm);
  },[currentUser,db.rolePermissions]);

  if(!currentUser) return <LoginScreen db={db} onLogin={setCurrentUser} fbStatus={fbStatus}/>;

  const allNav=[
    {k:'dashboard',label:'Dashboard',icon:'dash',perm:'view_dashboard'},
    {k:'patients',label:'Patients',icon:'patients',perm:'view_patients'},
    {k:'appointments',label:'Appointments',icon:'calendar',perm:'view_appointments'},
    {k:'history',label:'History',icon:'history',perm:'view_history'},
    {k:'prescriptions',label:'Prescriptions',icon:'rx',perm:'view_prescriptions'},
    null,
    {k:'invoices',label:'Invoices',icon:'invoice',perm:'view_invoices'},
    {k:'receipts',label:'Receipts',icon:'receipt',perm:'view_receipts'},
    {k:'bills',label:'Bills',icon:'bill',perm:'view_bills'},
    {k:'expenses',label:'Expenses',icon:'expense',perm:'view_expenses'},
    null,
    {k:'reports',label:'Reports',icon:'reports',perm:'view_reports'},
    null,
    {k:'doctors',label:'Doctors',icon:'doctors',perm:'view_doctors'},
    {k:'suppliers',label:'Suppliers',icon:'suppliers',perm:'view_suppliers'},
    {k:'users',label:'Users & Access',icon:'shield',perm:'view_users'},
    {k:'settings',label:'Settings',icon:'settings',perm:'view_settings'},
  ];
  const rp=db.rolePermissions||DEFAULT_PERMS;
  const nav=allNav.filter(n=>n===null||(rp[currentUser.role]||[]).includes(n.perm));
  const roleColors={admin:'#e8a030',doctor:'#4a90d9',accountant:'#38c878',receptionist:'#c084fc'};
  const pages={dashboard:<Dashboard db={db}/>,patients:<Patients db={db} setDb={setDb} can={can}/>,appointments:<Appointments db={db} setDb={setDb} can={can}/>,history:<History db={db} setDb={setDb} can={can}/>,prescriptions:<Prescriptions db={db} setDb={setDb} can={can}/>,invoices:<Invoices db={db} setDb={setDb} can={can}/>,receipts:<Receipts db={db} setDb={setDb} can={can}/>,bills:<Bills db={db} setDb={setDb} can={can}/>,expenses:<Expenses db={db} setDb={setDb} can={can}/>,reports:<Reports db={db}/>,doctors:<Doctors db={db} setDb={setDb} can={can}/>,suppliers:<Suppliers db={db} setDb={setDb} can={can}/>,users:<UsersPage db={db} setDb={setDb} currentUser={currentUser}/>,settings:<Settings db={db} setDb={setDb} can={can} fbStatus={fbStatus}/>};

  // Bottom nav items (5 most important, rest in drawer)
  const bnav=nav.filter(n=>n&&['dashboard','patients','appointments','invoices','reports'].includes(n.k)).slice(0,4);

  // Sidebar inner shared between desktop and mobile drawer
  const SidebarInner=()=>(
    <>
      <div style={{padding:'1.05rem .88rem .85rem',borderBottom:'1px solid #1e3650'}}>
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between'}}>
          <div style={{display:'flex',alignItems:'center',gap:'.6rem'}}>
            {db.settings?.logo?<img src={db.settings.logo} style={{width:32,height:32,borderRadius:8,objectFit:'contain',background:'#14508a',padding:2,flexShrink:0}}/>:
              <div style={{width:32,height:32,background:'linear-gradient(135deg,#14508a,#0c3060)',borderRadius:8,display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}><Icon n="tooth" s={17}/></div>}
            <div><div style={{color:'#e0f0fc',fontFamily:"'Cormorant Garamond',serif",fontSize:'.87rem',fontWeight:700,lineHeight:1.1}}>{db.settings?.clinicName||'Dental Clinic'}</div><div style={{color:'#2e4a60',fontSize:'.57rem',marginTop:1}}>Management System</div></div>
          </div>
          <button onClick={closeMob} className="hide-mobile" style={{display:'none',background:'none',border:'none',color:'#4a7090',cursor:'pointer',padding:4}} id="mob-close-btn"><Icon n="close" s={18}/></button>
        </div>
      </div>
      <div style={{display:'flex',alignItems:'center',gap:6,padding:'.42rem .88rem',background:'#060c16',borderBottom:'1px solid #1e3650',fontSize:'.66rem',color:fbStatus==='online'?'#38c878':'#4a7090'}}>
        <Icon n={syncing?'sync':fbStatus==='online'?'wifi':'wifioff'} s={11} className={syncing?'syncing':''}/>
        {syncing?'Syncing…':fbStatus==='online'?'Cloud sync on':'Local only'}
      </div>
      <nav style={{flex:1,padding:'.6rem .52rem',overflowY:'auto'}}>
        {nav.map((n,i)=>n===null?<div key={i} style={{height:1,background:'#1e3650',margin:'.32rem 0'}}/>:(
          <button key={n.k} onClick={()=>navTo(n.k)}
            style={{width:'100%',display:'flex',alignItems:'center',gap:'.52rem',padding:'.48rem .7rem',borderRadius:8,border:'none',background:active===n.k?'#14508a':'transparent',color:active===n.k?'#fff':'#4a7090',cursor:'pointer',fontSize:'.8rem',fontWeight:active===n.k?700:400,marginBottom:1,textAlign:'left',transition:'all .12s',minHeight:38}}
            onMouseEnter={e=>{if(active!==n.k)e.currentTarget.style.background='#0c1c2e'}}
            onMouseLeave={e=>{if(active!==n.k)e.currentTarget.style.background='transparent'}}>
            <Icon n={n.icon} s={14}/>{n.label}
          </button>
        ))}
      </nav>
      <div style={{padding:'.62rem .72rem',borderTop:'1px solid #1e3650'}}>
        <div style={{display:'flex',alignItems:'center',gap:'.52rem',marginBottom:'.52rem'}}>
          <div style={{width:28,height:28,borderRadius:'50%',background:`linear-gradient(135deg,${roleColors[currentUser.role]}44,${roleColors[currentUser.role]}22)`,border:`1.5px solid ${roleColors[currentUser.role]}55`,display:'flex',alignItems:'center',justifyContent:'center',color:roleColors[currentUser.role],fontWeight:700,fontSize:'.88rem',flexShrink:0}}>{currentUser.name.charAt(0)}</div>
          <div style={{overflow:'hidden',flex:1}}>
            <div style={{color:'#e0f0fc',fontSize:'.74rem',fontWeight:600,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{currentUser.name.split(' ')[0]}</div>
            <div style={{color:roleColors[currentUser.role],fontSize:'.6rem',textTransform:'capitalize'}}>{currentUser.role}</div>
          </div>
        </div>
        <button onClick={()=>setCurrentUser(null)} style={{width:'100%',background:'transparent',border:'1px solid #1e3650',borderRadius:7,padding:'.38rem',color:'#4a7090',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',gap:5,fontSize:'.72rem'}}>
          <Icon n="logout" s={11}/>Sign Out
        </button>
      </div>
    </>
  );

  return(<div style={{display:'flex',minHeight:'100vh',background:'#040b13',fontFamily:"'DM Sans',sans-serif",color:'#e0f0fc'}}>

    {/* ── DESKTOP SIDEBAR (hidden on mobile via CSS) ── */}
    <aside className="sidebar-desktop" style={{width:210,background:'#070f1a',borderRight:'1px solid #1e3650',display:'flex',flexDirection:'column',flexShrink:0,position:'sticky',top:0,height:'100vh',overflowY:'auto'}}>
      <SidebarInner/>
    </aside>

    {/* ── MOBILE OVERLAY ── */}
    <div className={'mob-overlay'+(mobOpen?' open':'')} onClick={closeMob}/>

    {/* ── MOBILE DRAWER SIDEBAR ── */}
    <aside className={'sidebar-mobile'+(mobOpen?' open':'')} style={{display:'flex',flexDirection:'column'}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'1rem .88rem .85rem',borderBottom:'1px solid #1e3650'}}>
        <div style={{display:'flex',alignItems:'center',gap:'.6rem'}}>
          {db.settings?.logo?<img src={db.settings.logo} style={{width:30,height:30,borderRadius:7,objectFit:'contain',background:'#14508a',padding:2,flexShrink:0}}/>:
            <div style={{width:30,height:30,background:'linear-gradient(135deg,#14508a,#0c3060)',borderRadius:7,display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}><Icon n="tooth" s={16}/></div>}
          <div><div style={{color:'#e0f0fc',fontFamily:"'Cormorant Garamond',serif",fontSize:'.85rem',fontWeight:700,lineHeight:1.1}}>{db.settings?.clinicName||'Dental Clinic'}</div><div style={{color:'#2e4a60',fontSize:'.56rem',marginTop:1}}>Management System</div></div>
        </div>
        <button onClick={closeMob} style={{background:'none',border:'none',color:'#4a7090',cursor:'pointer',padding:4}}><Icon n="close" s={18}/></button>
      </div>
      <div style={{display:'flex',alignItems:'center',gap:6,padding:'.4rem .88rem',background:'#060c16',borderBottom:'1px solid #1e3650',fontSize:'.65rem',color:fbStatus==='online'?'#38c878':'#4a7090'}}>
        <Icon n={syncing?'sync':fbStatus==='online'?'wifi':'wifioff'} s={11} className={syncing?'syncing':''}/>
        {syncing?'Syncing…':fbStatus==='online'?'Cloud sync on':'Local only'}
      </div>
      <nav style={{flex:1,padding:'.6rem .5rem',overflowY:'auto'}}>
        {nav.map((n,i)=>n===null?<div key={i} style={{height:1,background:'#1e3650',margin:'.3rem 0'}}/>:(
          <button key={n.k} onClick={()=>navTo(n.k)}
            style={{width:'100%',display:'flex',alignItems:'center',gap:'.55rem',padding:'.52rem .72rem',borderRadius:8,border:'none',background:active===n.k?'#14508a':'transparent',color:active===n.k?'#fff':'#4a7090',cursor:'pointer',fontSize:'.82rem',fontWeight:active===n.k?700:400,marginBottom:2,textAlign:'left',minHeight:42}}>
            <Icon n={n.icon} s={15}/>{n.label}
          </button>
        ))}
      </nav>
      <div style={{padding:'.6rem .7rem',borderTop:'1px solid #1e3650'}}>
        <div style={{display:'flex',alignItems:'center',gap:'.5rem',marginBottom:'.5rem'}}>
          <div style={{width:30,height:30,borderRadius:'50%',background:`linear-gradient(135deg,${roleColors[currentUser.role]}44,${roleColors[currentUser.role]}22)`,border:`1.5px solid ${roleColors[currentUser.role]}55`,display:'flex',alignItems:'center',justifyContent:'center',color:roleColors[currentUser.role],fontWeight:700,fontSize:'.9rem',flexShrink:0}}>{currentUser.name.charAt(0)}</div>
          <div style={{overflow:'hidden',flex:1}}>
            <div style={{color:'#e0f0fc',fontSize:'.78rem',fontWeight:600,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{currentUser.name}</div>
            <div style={{color:roleColors[currentUser.role],fontSize:'.63rem',textTransform:'capitalize'}}>{currentUser.role}</div>
          </div>
        </div>
        <button onClick={()=>setCurrentUser(null)} style={{width:'100%',background:'transparent',border:'1px solid #1e3650',borderRadius:7,padding:'.4rem',color:'#4a7090',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',gap:5,fontSize:'.74rem'}}>
          <Icon n="logout" s={12}/>Sign Out
        </button>
      </div>
    </aside>

    {/* ── RIGHT COLUMN: header + main + bottom nav ── */}
    <div style={{display:'flex',flexDirection:'column',flex:1,minWidth:0,minHeight:'100vh'}}>

      {/* Mobile top header — hidden on desktop via CSS */}
      <div className="mob-header">
        <button onClick={()=>setMobOpen(true)} style={{background:'none',border:'none',color:'#e0f0fc',cursor:'pointer',padding:4,display:'flex',alignItems:'center'}}><Icon n="menu" s={22}/></button>
        <span style={{fontFamily:"'Cormorant Garamond',serif",color:'#e0f0fc',fontSize:'1.05rem',fontWeight:700}}>{db.settings?.clinicName||'Dental Clinic'}</span>
        <div style={{width:28,display:'flex',alignItems:'center',justifyContent:'flex-end',color:fbStatus==='online'?'#38c878':'#4a7090'}}>
          <Icon n={fbStatus==='online'?'wifi':'wifioff'} s={14}/>
        </div>
      </div>

      {/* Main content */}
      <main className="main-content" style={{flex:1,padding:'1.5rem 1.7rem',overflowY:'auto',maxHeight:'100vh'}}>
        {pages[active]||<div style={{color:'#2e4a60',textAlign:'center',padding:'4rem'}}>Select a section from the sidebar.</div>}
      </main>

      {/* Mobile bottom nav — hidden on desktop via CSS */}
      <nav className="bottom-nav">
        {bnav.map(n=>(
          <button key={n.k} className={'bottom-nav-item'+(active===n.k?' active':'')} onClick={()=>navTo(n.k)}>
            <Icon n={n.icon} s={20}/>
            <span>{n.label}</span>
          </button>
        ))}
        <button className="bnav-more" onClick={()=>setMobOpen(true)}>
          <Icon n="menu" s={20}/>
          <span style={{fontSize:'.6rem',fontWeight:600}}>More</span>
        </button>
      </nav>

    </div>

  </div>);
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
