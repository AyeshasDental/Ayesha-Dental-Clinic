import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, onValue, set, get } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const FIREBASE_CONFIG = {
  apiKey:            "AIzaSyBW5cg6Q8KgpArkSxu5jAD8A1DnVgZNE2Q",
  authDomain:        "ayesha-dental-clinicmanagement.firebaseapp.com",
  databaseURL:       "https://ayesha-dental-clinicmanagement-default-rtdb.firebaseio.com",
  projectId:         "ayesha-dental-clinicmanagement",
  storageBucket:     "ayesha-dental-clinicmanagement.firebasestorage.app",
  messagingSenderId: "1074338883048",
  appId:             "1:1074338883048:web:fbd285c3f04cd3e9da705d"
};

const FB_PATH = "adc/v1";
let fbdb;
try {
  const app = initializeApp(FIREBASE_CONFIG);
  fbdb = getDatabase(app);
  console.log("✅ Firebase initialized");
} catch(e) {
  console.error("❌ Firebase init failed:", e.message);
}

window.__fb = {
  enabled: !!fbdb,
  async load() {
    try {
      const snap = await get(ref(fbdb, FB_PATH));
      return snap.exists() ? snap.val() : null;
    } catch(e) { console.error("FB load error:", e); return null; }
  },
  async save(data) {
    try { await set(ref(fbdb, FB_PATH), data); }
    catch(e) { console.error("FB save error:", e); }
  },
  subscribe(cb) {
    return onValue(ref(fbdb, FB_PATH), snap => {
      if(snap.exists()) cb(snap.val());
    }, e => console.error("FB sub error:", e));
  }
};
</script>

html,body{height:100%;background:#040b13;font-family:'DM Sans',sans-serif;color:#e0f0fc}
input,select,textarea,button{font-family:'DM Sans',sans-serif}

select option{background:#0b1520}

input[type=color]{padding:0;border:none;border-radius:6px;cursor:pointer}

/* ── ROOT & APP SHELL ── */
#root{height:100%;display:flex;flex-direction:column}
.app-shell{display:flex;min-height:100vh;width:100%;background:#040b13}

/* ── DESKTOP SIDEBAR ── */
.sidebar-desktop{

  display:flex;flex-direction:column;flex-shrink:0;

/* ── MAIN COLUMN (fills all remaining space) ── */
.main-col{display:flex;flex-direction:column;flex:1;min-width:0;min-height:100vh}
.main-content{flex:1;padding:1.5rem 1.7rem;overflow-y:auto}

/* ── PRINT ── */
#print-frame{position:fixed;left:-9999px;top:-9999px;width:800px;height:600px;border:none}
@keyframes spin{to{transform:rotate(360deg)}}
.syncing{animation:spin .8s linear infinite}

/* ── TOAST ── */
#toast{position:fixed;bottom:1.5rem;right:1rem;z-index:9999;display:flex;flex-direction:column;gap:.4rem;pointer-events:none}
.toast-item{background:#0d3a22;border:1px solid #38c878;color:#38c878;padding:.55rem 1rem;border-radius:10px;font-size:.8rem;font-weight:600;transition:opacity .3s;box-shadow:0 4px 20px rgba(0,0,0,.4)}
.toast-item.err{background:#3a0d0d;border-color:#d95050;color:#d95050}
input[type=checkbox]{accent-color:#14508a;width:15px;height:15px;cursor:pointer}
@media print{body{background:#fff!important;color:#111!important}.no-print{display:none!important}}

/* ── MOBILE DRAWER ── */
.sidebar-mobile{
  display:none;position:fixed;left:0;top:0;bottom:0;width:240px;z-index:300;
  background:#070f1a;border-right:1px solid #1e3650;
  flex-direction:column;height:100vh;overflow-y:auto;
  transform:translateX(-100%);transition:transform .22s cubic-bezier(.4,0,.2,1)
}
.sidebar-mobile.open{transform:translateX(0)}
.mob-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:200;opacity:0;transition:opacity .22s;pointer-events:none}
.mob-overlay.open{opacity:1;pointer-events:auto}

/* ── BOTTOM NAV ── */
.bottom-nav{display:none;position:fixed;bottom:0;left:0;right:0;z-index:150;background:#070f1a;border-top:1px solid #1e3650;padding:0;height:58px;align-items:stretch}
.bottom-nav-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;border:none;background:none;color:#4a7090;cursor:pointer;font-size:.6rem;font-weight:600;padding:4px 2px;transition:color .15s;-webkit-tap-highlight-color:transparent}
.bottom-nav-item.active{color:#4a90d9}
.bnav-more{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;border:none;background:none;color:#4a7090;cursor:pointer;font-size:.6rem;font-weight:600;padding:4px 2px;-webkit-tap-highlight-color:transparent}

/* ── MOBILE HEADER ── */
.mob-header{display:none;align-items:center;justify-content:space-between;padding:.7rem 1rem;background:#070f1a;border-bottom:1px solid #1e3650;position:sticky;top:0;z-index:100;height:52px;flex-shrink:0}

@media(max-width:768px){

// ─── PRINT ENGINE ────────────────────────────────────────────────────────────
function doPrint(html){
  const frame=document.getElementById('print-frame');
  const doc=frame.contentDocument||frame.contentWindow.document;
  doc.open();doc.write(html);doc.close();
  frame.contentWindow.onload=()=>setTimeout(()=>frame.contentWindow.print(),400);
  setTimeout(()=>frame.contentWindow.print(),800);
}
function buildPrintHtml(type,doc,db){
  const s=db.settings||SEED.settings;const ac=s.invoiceColor||'#1565a0';
  const layout=type==='receipt'?s.receiptLayout:s.invoiceLayout;

  const pt=db.patients?.find(p=>p.id===doc.patientId);
  const sp=db.suppliers?.find(x=>x.id===doc.supplierId);
  const dr=db.doctors?.find(d=>d.id===doc.doctorId);
  const entity=pt||sp;
  const logoHtml=s.showLogoOnDocs&&s.logo?`<img src="${s.logo}" style="height:55px;object-fit:contain;border-radius:6px"/>`:

  const css=`*{box-sizing:border-box;margin:0;padding:0}body{font-family:Georgia,serif;color:#111;background:#fff}table{width:100%;border-collapse:collapse;margin:14px 0}th{background:#f0f5fb;padding:8px 11px;text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:#444;border-bottom:2px solid #dde5ef}td{padding:8px 11px;border-bottom:1px solid #edf1f6;font-size:13px}.amt{text-align:right}.tr-total td{font-weight:700;font-size:14px;background:#f8fbff;border-top:2px solid #ccd5e0}.footer{margin-top:40px;text-align:center;color:#888;font-size:11px;border-top:1px solid #e0e5ea;padding-top:14px}.badge-paid{color:#1a7340;background:#e0f4ea;padding:2px 10px;border-radius:12px;font-size:11px;font-weight:700}.badge-partial{color:#7a4d00;background:#fff3e0;padding:2px 10px;border-radius:12px;font-size:11px;font-weight:700}.badge-unpaid{color:#8b0000;background:#fde8e8;padding:2px 10px;border-radius:12px;font-size:11px;font-weight:700}@media print{body{padding:0!important}}`;
  let billTo='';if(entity)billTo=`<div style="margin-bottom:18px;padding:12px 14px;background:#f8f9fb;border-radius:8px;font-size:13px"><strong>${type==='bill'?'Supplier':'Bill To'}:</strong><br/><strong style="font-size:15px">${entity.name||'—'}</strong>${entity.phone?`<br/>${entity.phone}`:''}${entity.address?`<br/>${entity.address}`:''}${dr?`<br/>Doctor: ${dr.name}`:''}</div>`;
  let items='';if(doc.items?.length){items=`<table><thead><tr><th>#</th><th>Description</th><th>Qty</th><th>Rate</th><th class="amt">Amount</th></tr></thead><tbody>${doc.items.map((it,i)=>`<tr><td>${i+1}</td><td>${it.desc||''}</td><td>${it.qty}</td><td>${fmtPKR(it.rate)}</td><td class="amt"><strong>${fmtPKR(Number(it.qty)*Number(it.rate))}</strong></td></tr>`).join('')}</tbody></table>`;}
  let totals='';
  if(doc.amount!=null){totals=`<div style="border:2px solid #111;border-radius:10px;padding:20px;text-align:center;margin:18px 0"><div style="font-size:32px;font-weight:800;color:#1a7340;font-family:Georgia,serif">${fmtPKR(doc.amount)}</div><div style="color:#555;margin-top:4px;font-size:13px">Amount Received · ${doc.method||''}</div></div>`;}
  else if(doc.total!=null){const bal=doc.total-(doc.paid||0);totals=`<div style="display:flex;justify-content:flex-end;margin-top:8px"><table style="width:260px;margin:0"><tbody>${doc.subtotal!=null?`<tr><td>Subtotal</td><td class="amt">${fmtPKR(doc.subtotal)}</td></tr>`:''}${doc.tax?`<tr><td>${s.taxLabel||'Tax'}</td><td class="amt">${fmtPKR(doc.tax)}</td></tr>`:''}${doc.discount?`<tr><td>Discount</td><td class="amt">- ${fmtPKR(doc.discount)}</td></tr>`:''}<tr class="tr-total"><td>TOTAL</td><td class="amt">${fmtPKR(doc.total)}</td></tr>${doc.paid!=null?`<tr><td>Paid</td><td class="amt" style="color:#1a7340"><strong>${fmtPKR(doc.paid)}</strong></td></tr>`:''}${bal>0?`<tr class="tr-total"><td>Balance Due</td><td class="amt" style="color:#8b0000">${fmtPKR(bal)}</td></tr>`:''}</tbody></table></div>`;}
  let payments='';if(doc.payments?.length){payments=`<div style="margin-top:18px"><div style="font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:#666;margin-bottom:6px;font-weight:700">Payment History</div><table><thead><tr><th>Date</th><th>Method</th><th>Note</th><th class="amt">Amount</th></tr></thead><tbody>${doc.payments.map(p=>`<tr><td>${p.date}</td><td>${p.method}</td><td>${p.note||'—'}</td><td class="amt" style="color:#1a7340;font-weight:700">${fmtPKR(p.amount)}</td></tr>`).join('')}</tbody></table></div>`;}
  const hClinic=`<div style="display:flex;gap:14px;align-items:center">${logoHtml}<div><div style="font-size:21px;font-weight:bold;color:${ac};font-family:Georgia,serif">${s.clinicName||''}</div>${s.tagline?`<div style="color:#666;font-size:12px">${s.tagline}</div>`:''}<div style="color:#666;font-size:12px">${[s.phone,s.email].filter(Boolean).join(' · ')}</div>${s.address?`<div style="color:#666;font-size:12px">${s.address}</div>`:''}</div></div>`;
  const hDoc=`<div style="text-align:right"><div style="font-size:26px;font-weight:800;color:${ac};font-family:Georgia,serif">${doc.id||type.toUpperCase()}</div><div style="color:#666;font-size:12px;margin-top:3px">Date: ${doc.date}</div>${doc.dueDate?`<div style="color:#666;font-size:12px">Due: ${doc.dueDate}</div>`:''}${doc.status?`<div style="margin-top:6px"><span class="badge-${doc.status}">${doc.status}</span></div>`:''}</div>`;
  let body='';
  if(layout==='modern'){body=`<div style="background:${ac};color:white;padding:24px 32px;display:flex;justify-content:space-between;align-items:center">${s.showLogoOnDocs&&s.logo?`<img src="${s.logo}" style="height:44px;object-fit:contain;border-radius:6px;background:white;padding:3px"/>`:''}<div><div style="font-size:19px;font-weight:bold">${s.clinicName}</div><div style="opacity:.8;font-size:11px">${s.address||''}</div></div><div style="text-align:right"><div style="font-size:26px;font-weight:800;opacity:.9">${doc.id||''}</div><div style="opacity:.8;font-size:11px">Date: ${doc.date}</div></div></div><div style="padding:24px 32px">${billTo}${items}${totals}${payments}${doc.notes?`<p style="color:#555;font-size:12px;margin-top:12px">Notes: ${doc.notes}</p>`:''}</div>`;}
  else if(layout==='minimal'){body=`<div style="padding:28px;max-width:620px;margin:auto"><div style="margin-bottom:18px"><div style="font-size:17px;font-weight:bold">${s.clinicName}</div><div style="color:#666;font-size:11px">${s.address||''}</div></div><div style="display:flex;justify-content:space-between;border-bottom:2px solid #111;padding-bottom:12px;margin-bottom:18px"><div style="font-size:22px;font-weight:800">${type.toUpperCase()}</div><div style="font-size:12px;color:#555"><div>${doc.id||''}</div><div>Date: ${doc.date}</div></div></div>${billTo}${items}${totals}${payments}</div>`;}
  else{body=`<div style="padding:28px"><div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:20px;padding-bottom:16px;border-bottom:3px solid ${ac}">${hClinic}${hDoc}</div>${billTo}${items}${totals}${payments}${doc.notes?`<p style="color:#555;font-size:12px;margin-top:12px">Notes: ${doc.notes}</p>`:''}</div>`;}
  return `<!DOCTYPE html><html><head><meta charset="UTF-8"/><title>${type} ${doc.id||''}</title><style>${css}</style></head><body>${body}<div class="footer" style="padding:14px 28px 28px">${footer||''}<br/>Generated on ${new Date().toLocaleString()}</div></body></html>`;
}
function printDoc(type,doc,db){doPrint(buildPrintHtml(type,doc,db));}

const PayModal=({doc,onSave,onClose})=>{
  const bal=doc.total-(doc.paid||0);
  const[amt,setAmt]=useState(String(bal));const[method,setMethod]=useState('Cash');const[date,setDate]=useState(today());const[note,setNote]=useState('');
  const go=()=>{const a=Number(amt);if(!a||a<=0)return;const newPaid=Math.min((doc.paid||0)+a,doc.total);const status=newPaid>=doc.total?'paid':'partial';onSave({...doc,paid:newPaid,status,payments:[...(doc.payments||[]),{id:uid('PAY'),date,amount:a,method,note}]});};
  return(<Modal title={`Record Payment — ${doc.id}`} onClose={onClose}>
    <div style={{background:'#06101a',border:'1px solid #1e3650',borderRadius:12,padding:'1rem',marginBottom:'1.1rem',display:'grid',gridTemplateColumns:'1fr 1fr',gap:'.5rem'}}>
      {[['Document',doc.id],['Total',fmtPKR(doc.total)],['Paid So Far',fmtPKR(doc.paid||0)],['Balance Due',fmtPKR(bal)]].map(([k,v])=>(
        <div key={k}><div style={{color:'#3d6080',fontSize:'.67rem',textTransform:'uppercase',marginBottom:2}}>{k}</div>
        <div style={{color:k==='Balance Due'?'#e85050':'#e0f0fc',fontWeight:700,fontSize:'.88rem'}}>{v}</div></div>
      ))}
    </div>
    {bal<=0?<div style={{color:'#38c878',textAlign:'center',padding:'1rem',background:'#0b3a22',borderRadius:10}}>✓ Fully paid.</div>
    :<><FI label="Amount (PKR)" type="number" value={amt} onChange={setAmt} required/>
      <FI label="Payment Date" type="date" value={date} onChange={setDate}/>
      <FS label="Payment Method" value={method} onChange={setMethod} options={['Cash','Card','Bank Transfer','Cheque','JazzCash','EasyPaisa']}/>
      <FI label="Note / Reference" value={note} onChange={setNote} placeholder="Cheque no., transfer ref, etc."/>
      <Btn full success onClick={go} icon="pay">Record Payment of {fmtPKR(Number(amt)||0)}</Btn>
    </>}
  </Modal>);
};

        <thead><tr>{['Date','Method','Note','Amount'].map(h=><th key={h} style={{color:'#2e4a60',fontSize:'.66rem',textTransform:'uppercase',padding:'.34rem .44rem',textAlign:'left',borderBottom:'1px solid #1e3650'}}>{h}</th>)}</tr></thead>
        <tbody>{doc.payments.map(p=><tr key={p.id}><td style={{color:'#4a7090',padding:'.34rem .44rem',fontSize:'.8rem'}}>{p.date}</td><td style={{color:'#e0f0fc',padding:'.34rem .44rem',fontSize:'.8rem'}}>{p.method}</td><td style={{color:'#4a7090',padding:'.34rem .44rem',fontSize:'.8rem'}}>{p.note||'—'}</td><td style={{color:'#38c878',padding:'.34rem .44rem',fontSize:'.8rem',fontWeight:700}}>{fmtPKR(p.amount)}</td></tr>)}</tbody>

};

          <span style={{color:'#d95050',fontSize:'.67rem',display:'flex',alignItems:'center',gap:4}}><span style={{width:10,height:10,background:'#6b1515',borderRadius:2,display:'inline-block'}}/>Expenses</span>

const Doctors=({db,setDb,can})=>{
  const[modal,setModal]=useState(false);const[editId,setEditId]=useState(null);
  const blank={name:'',specialization:'',phone:'',email:'',fee:'',active:true};
  const[form,setForm]=useState(blank);
  const doctors=db.doctors||[];
  const save=()=>{if(!form.name)return;const d={...form,fee:Number(form.fee)};if(editId)setDb(x=>({...x,doctors:(x.doctors||[]).map(dr=>dr.id===editId?{...d,id:editId}:dr)}));else setDb(x=>({...x,doctors:[...(x.doctors||[]),{...d,id:Date.now()}]}));setModal(false);setForm(blank);setEditId(null);};
  const del=id=>{if(window.confirm('Remove?'))setDb(x=>({...x,doctors:(x.doctors||[]).filter(d=>d.id!==id)}));};
  return(<div>
    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'1.1rem'}}>
      <h2 style={{fontFamily:"'Cormorant Garamond',serif",fontSize:'1.55rem',color:'#e0f0fc',margin:0}}>Doctors</h2>
      {can('edit_doctors')&&<Btn icon="plus" onClick={()=>{setForm(blank);setEditId(null);setModal(true)}}>Add Doctor</Btn>}
    </div>
    <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(275px,1fr))',gap:'.72rem'}}>
      {doctors.map(dr=>(
        <Card key={dr.id}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start'}}>
            <div style={{display:'flex',gap:'.72rem',alignItems:'center'}}>
              <div style={{width:42,height:42,borderRadius:'50%',background:'linear-gradient(135deg,#1a3d6e,#14508a)',display:'flex',alignItems:'center',justifyContent:'center',color:'#fff',fontWeight:700,fontSize:'1rem',flexShrink:0}}>{dr.name.charAt(3)||'D'}</div>
              <div><div style={{color:'#e0f0fc',fontWeight:700}}>{dr.name}</div><div style={{color:'#4a90d9',fontSize:'.74rem'}}>{dr.specialization}</div></div>
            </div>
            {can('edit_doctors')&&<div style={{display:'flex',gap:'.32rem'}}><Btn sm ghost icon="edit" onClick={()=>{setForm({...dr,fee:String(dr.fee)});setEditId(dr.id);setModal(true);}}/><Btn sm ghost icon="trash" danger onClick={()=>del(dr.id)}/></div>}
          </div>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'.38rem',marginTop:'1rem'}}>
            {[['Phone',dr.phone||'—'],['Email',dr.email||'—'],['Consult Fee',fmtPKR(dr.fee)],['Status',dr.active?'Active':'Inactive']].map(([k,v])=>(
              <div key={k} style={{background:'#060c16',borderRadius:7,padding:'.48rem .68rem'}}><div style={{color:'#2e4a60',fontSize:'.64rem',textTransform:'uppercase',marginBottom:2}}>{k}</div><div style={{color:k==='Status'?(dr.active?'#38c878':'#d95050'):'#e0f0fc',fontSize:'.79rem',fontWeight:600}}>{v}</div></div>
            ))}
          </div>
        </Card>
      ))}
    </div>
    {modal&&<Modal title={editId?'Edit Doctor':'Add Doctor'} onClose={()=>{setModal(false);setEditId(null);setForm(blank)}}>
      <FI label="Full Name" value={form.name} onChange={v=>setForm(f=>({...f,name:v}))} required/>
      <FI label="Specialization" value={form.specialization} onChange={v=>setForm(f=>({...f,specialization:v}))}/>
      <G2><FI label="Phone" value={form.phone} onChange={v=>setForm(f=>({...f,phone:v}))}/><FI label="Email" type="email" value={form.email} onChange={v=>setForm(f=>({...f,email:v}))}/></G2>
      <FI label="Consultation Fee (PKR)" type="number" value={form.fee} onChange={v=>setForm(f=>({...f,fee:v}))}/>
      <FS label="Status" value={form.active?'active':'inactive'} onChange={v=>setForm(f=>({...f,active:v==='active'}))} options={[{value:'active',label:'Active'},{value:'inactive',label:'Inactive'}]}/>
      <Btn full onClick={save}>{editId?'Update':'Add'} Doctor</Btn>
    </Modal>}
  </div>);
};

// ─── SUPPLIERS ───────────────────────────────────────────────────────────────
const Suppliers=({db,setDb,can})=>{
  const[modal,setModal]=useState(false);const[editId,setEditId]=useState(null);
  const blank={name:'',contact:'',phone:'',email:'',address:'',category:'Dental Supplies'};
  const[form,setForm]=useState(blank);
  const suppliers=db.suppliers||[];
  const save=()=>{if(!form.name)return;if(editId)setDb(x=>({...x,suppliers:(x.suppliers||[]).map(s=>s.id===editId?{...form,id:editId}:s)}));else setDb(x=>({...x,suppliers:[...(x.suppliers||[]),{...form,id:Date.now()}]}));setModal(false);setForm(blank);setEditId(null);};
  const del=id=>{if(window.confirm('Remove?'))setDb(x=>({...x,suppliers:(x.suppliers||[]).filter(s=>s.id!==id)}));};
  const cats=['Dental Supplies','Equipment','Real Estate','Utilities','Lab Services','Employee','Other'];
  return(<div>
    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'1.1rem'}}>
      <h2 style={{fontFamily:"'Cormorant Garamond',serif",fontSize:'1.55rem',color:'#e0f0fc',margin:0}}>Suppliers</h2>
      {can('edit_suppliers')&&<Btn icon="plus" onClick={()=>{setForm(blank);setEditId(null);setModal(true)}}>Add Supplier</Btn>}
    </div>
    <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(275px,1fr))',gap:'.72rem'}}>
      {suppliers.map(s=>{const outstanding=(db.bills||[]).filter(b=>b.supplierId===s.id).reduce((a,b)=>a+(b.total-b.paid),0);return(
        <Card key={s.id}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start'}}>
            <div><div style={{color:'#e0f0fc',fontWeight:700,fontSize:'.92rem'}}>{s.name}</div><div style={{color:'#c084fc',fontSize:'.72rem',marginTop:2}}>{s.category}</div></div>
            {can('edit_suppliers')&&<div style={{display:'flex',gap:'.32rem'}}><Btn sm ghost icon="edit" onClick={()=>{setForm({...s});setEditId(s.id);setModal(true);}}/><Btn sm ghost icon="trash" danger onClick={()=>del(s.id)}/></div>}
          </div>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'.38rem',marginTop:'1rem'}}>
            {[['Contact',s.contact||'—'],['Phone',s.phone||'—'],['Email',s.email||'—'],['Outstanding',fmtPKR(outstanding)]].map(([k,v])=>(
              <div key={k} style={{background:'#060c16',borderRadius:7,padding:'.48rem .68rem'}}><div style={{color:'#2e4a60',fontSize:'.64rem',textTransform:'uppercase',marginBottom:2}}>{k}</div><div style={{color:k==='Outstanding'&&outstanding>0?'#d95050':'#e0f0fc',fontSize:'.79rem',fontWeight:600}}>{v}</div></div>
            ))}
          </div>
        </Card>);})}
      {suppliers.length===0&&<div style={{color:'#2e4a60',textAlign:'center',padding:'3rem'}}>No suppliers yet.</div>}
    </div>
    {modal&&<Modal title={editId?'Edit Supplier':'Add Supplier'} onClose={()=>{setModal(false);setEditId(null);setForm(blank)}}>
      <FI label="Company Name" value={form.name} onChange={v=>setForm(f=>({...f,name:v}))} required/>
      <G2><FI label="Contact Person" value={form.contact} onChange={v=>setForm(f=>({...f,contact:v}))}/><FI label="Phone" value={form.phone} onChange={v=>setForm(f=>({...f,phone:v}))}/></G2>
      <FI label="Email" type="email" value={form.email} onChange={v=>setForm(f=>({...f,email:v}))}/>
      <FTA label="Address" value={form.address} onChange={v=>setForm(f=>({...f,address:v}))} rows={2}/>
      <FS label="Category" value={form.category} onChange={v=>setForm(f=>({...f,category:v}))} options={cats}/>
      <Btn full onClick={save}>{editId?'Update':'Add'} Supplier</Btn>
    </Modal>}
  </div>);
};

// ─── USERS PAGE ──────────────────────────────────────────────────────────────
const UsersPage=({db,setDb,currentUser})=>{
  const[tab,setTab]=useState('users');const[modal,setModal]=useState(false);const[editId,setEditId]=useState(null);
  const blank={name:'',email:'',password:'',role:'receptionist',active:true};
  const[form,setForm]=useState(blank);const[editRole,setEditRole]=useState('doctor');
  const perms=db.rolePermissions||DEFAULT_PERMS;
  const roleColors={admin:'#e8a030',doctor:'#4a90d9',accountant:'#38c878',receptionist:'#c084fc'};
  if(currentUser.role!=='admin') return <div style={{color:'#2e4a60',textAlign:'center',padding:'4rem'}}><Icon n="shield" s={40}/><p style={{marginTop:'1rem'}}>Access restricted to administrators only.</p></div>;
  const save=()=>{if(!form.name||!form.email)return;if(editId)setDb(x=>({...x,users:(x.users||[]).map(u=>u.id===editId?{...form,id:editId}:u)}));else setDb(x=>({...x,users:[...(x.users||[]),{...form,id:Date.now()}]}));setModal(false);setForm(blank);setEditId(null);};
  const del=id=>{if(id===currentUser.id){alert("Can't delete yourself.");return;}if(window.confirm('Delete?'))setDb(x=>({...x,users:(x.users||[]).filter(u=>u.id!==id)}));};
  const togglePerm=(role,perm)=>{const rp={...perms,[role]:perms[role].includes(perm)?perms[role].filter(p=>p!==perm):[...perms[role],perm]};setDb(x=>({...x,rolePermissions:rp}));};
  const permLabel=p=>p.replace(/_/g,' ').replace(/\b\w/g,c=>c.toUpperCase());
  const permGroups=[['Clinical',['view_dashboard','view_patients','edit_patients','view_appointments','edit_appointments','view_history','edit_history','view_prescriptions','edit_prescriptions']],['Finance',['view_invoices','edit_invoices','pay_invoices','view_receipts','edit_receipts','view_bills','edit_bills','pay_bills','view_expenses','edit_expenses','view_reports']],['Admin',['view_doctors','edit_doctors','view_suppliers','edit_suppliers','view_users','edit_users','view_settings','edit_settings']]];
  return(<div>
    <h2 style={{fontFamily:"'Cormorant Garamond',serif",fontSize:'1.55rem',color:'#e0f0fc',margin:'0 0 1.1rem'}}>Users & Access Control</h2>
    <div style={{display:'flex',gap:'.38rem',marginBottom:'1.1rem'}}>
      {[['users','Users'],['roles','Role Permissions']].map(([k,l])=><button key={k} onClick={()=>setTab(k)} style={{background:tab===k?'#14508a':'transparent',border:tab===k?'none':'1px solid #1e3650',borderRadius:7,padding:'.32rem .82rem',color:tab===k?'#fff':'#4a7090',cursor:'pointer',fontWeight:tab===k?700:400,fontSize:'.78rem'}}>{l}</button>)}
    </div>
    {tab==='users'&&<>
      <div style={{display:'flex',justifyContent:'flex-end',marginBottom:'1rem'}}><Btn icon="plus" onClick={()=>{setForm(blank);setEditId(null);setModal(true)}}>Add User</Btn></div>
      <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(265px,1fr))',gap:'.72rem'}}>
        {(db.users||[]).map(u=>(
          <Card key={u.id}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start'}}>
              <div style={{display:'flex',gap:'.68rem',alignItems:'center'}}>
                <div style={{width:40,height:40,borderRadius:'50%',background:`linear-gradient(135deg,${roleColors[u.role]||'#4a7090'}44,${roleColors[u.role]||'#4a7090'}22)`,border:`1.5px solid ${roleColors[u.role]||'#4a7090'}55`,display:'flex',alignItems:'center',justifyContent:'center',color:roleColors[u.role]||'#4a7090',fontWeight:700,fontSize:'.95rem',flexShrink:0}}>{u.name.charAt(0)}</div>
                <div><div style={{color:'#e0f0fc',fontWeight:700}}>{u.name}{u.id===currentUser.id&&<span style={{color:'#38c878',fontSize:'.6rem',background:'#0b3a22',borderRadius:4,padding:'1px 5px',marginLeft:6}}>You</span>}</div><div style={{color:roleColors[u.role]||'#4a7090',fontSize:'.7rem',textTransform:'capitalize'}}>{u.role}</div></div>
              </div>
              <div style={{display:'flex',gap:'.32rem'}}><Btn sm ghost icon="edit" onClick={()=>{setForm({...u});setEditId(u.id);setModal(true);}}/>{u.id!==currentUser.id&&<Btn sm ghost icon="trash" danger onClick={()=>del(u.id)}/>}</div>
            </div>
            <div style={{background:'#060c16',borderRadius:7,padding:'.48rem .68rem',marginTop:'1rem'}}><div style={{color:'#2e4a60',fontSize:'.64rem',textTransform:'uppercase',marginBottom:2}}>Email</div><div style={{color:'#e0f0fc',fontSize:'.79rem'}}>{u.email}</div></div>
          </Card>
        ))}
      </div>
    </>}
    {tab==='roles'&&<div>
      <div style={{display:'flex',gap:'.38rem',marginBottom:'1.1rem',flexWrap:'wrap'}}>
        {['doctor','accountant','receptionist'].map(r=><button key={r} onClick={()=>setEditRole(r)} style={{background:editRole===r?roleColors[r]+'22':'transparent',border:`1px solid ${editRole===r?roleColors[r]:'#1e3650'}`,borderRadius:7,padding:'.32rem .82rem',color:editRole===r?roleColors[r]:'#4a7090',cursor:'pointer',fontWeight:editRole===r?700:400,fontSize:'.78rem',textTransform:'capitalize'}}>{r}</button>)}
      </div>
      <Card>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'1rem'}}>
          <div style={{color:'#e0f0fc',fontWeight:700,textTransform:'capitalize'}}>{editRole} — {(perms[editRole]||[]).length}/{ALL_PERMS.length} permissions</div>
          <Btn sm ghost onClick={()=>setDb(x=>({...x,rolePermissions:{...perms,[editRole]:DEFAULT_PERMS[editRole]}}))}>Reset to Default</Btn>
        </div>
        {permGroups.map(([group,ps])=>(
          <div key={group} style={{marginBottom:'1.1rem'}}>
            <div style={{color:'#4a7090',fontSize:'.66rem',textTransform:'uppercase',letterSpacing:'.08em',marginBottom:7,fontWeight:700}}>{group}</div>
            <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(215px,1fr))',gap:'.38rem'}}>
              {ps.map(p=>{const has=(perms[editRole]||[]).includes(p);return(
                <label key={p} style={{display:'flex',alignItems:'center',gap:'.48rem',cursor:'pointer',background:has?'#0b3a22':'#060c16',border:`1px solid ${has?'#38c878':'#1e3650'}`,borderRadius:7,padding:'.38rem .68rem'}}>
                  <input type="checkbox" checked={has} onChange={()=>togglePerm(editRole,p)}/>
                  <span style={{color:has?'#38c878':'#4a7090',fontSize:'.74rem'}}>{permLabel(p)}</span>
                </label>);})}
            </div>
          </div>
        ))}
      </Card>
    </div>}
    {modal&&<Modal title={editId?'Edit User':'Add User'} onClose={()=>{setModal(false);setEditId(null);setForm(blank)}}>
      <FI label="Full Name" value={form.name} onChange={v=>setForm(f=>({...f,name:v}))} required/>
      <FI label="Email" type="email" value={form.email} onChange={v=>setForm(f=>({...f,email:v}))} required/>
      <FI label="Password" type="password" value={form.password} onChange={v=>setForm(f=>({...f,password:v}))} placeholder={editId?'Leave blank to keep current':'••••••••'}/>
      <FS label="Role" value={form.role} onChange={v=>setForm(f=>({...f,role:v}))} options={['admin','doctor','accountant','receptionist'].map(r=>({value:r,label:r.charAt(0).toUpperCase()+r.slice(1)}))}/>
      <FS label="Status" value={form.active?'active':'inactive'} onChange={v=>setForm(f=>({...f,active:v==='active'}))} options={[{value:'active',label:'Active'},{value:'inactive',label:'Inactive'}]}/>
      <Btn full onClick={save}>{editId?'Update':'Create'} User</Btn>
    </Modal>}
  </div>);
};

// ─── SETTINGS ────────────────────────────────────────────────────────────────
const Settings=({db,setDb,can})=>{
  const[tab,setTab]=useState('clinic');
  const s=db.settings||SEED.settings;
  const upd=v=>setDb(x=>({...x,settings:{...x.settings,...v}}));
  const logoRef=useRef();const importRef=useRef();
  const handleLogo=e=>{const fi=e.target.files[0];if(!fi)return;const r=new FileReader();r.onload=ev=>upd({logo:ev.target.result});r.readAsDataURL(fi);};
  const editable=can('edit_settings');
  const exportData=()=>{const blob=new Blob([JSON.stringify(db,null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=`adc-backup-${today()}.json`;a.click();showToast('Backup downloaded!');};
  const importData=e=>{const fi=e.target.files[0];if(!fi)return;const r=new FileReader();r.onload=ev=>{try{const d=JSON.parse(ev.target.result);setDb(safeDb(d));showToast('Data imported successfully!');}catch{showToast('Invalid backup file.',true);}};r.readAsText(fi);};
  const layouts=[{value:'classic',label:'Classic',desc:'Traditional with header bar'},{value:'modern',label:'Modern',desc:'Bold colored hero header'},{value:'minimal',label:'Minimal',desc:'Clean typographic style'}];
  if(!can('view_settings')) return <div style={{color:'#2e4a60',textAlign:'center',padding:'4rem'}}>Access denied.</div>;
  return(<div>
    <h2 style={{fontFamily:"'Cormorant Garamond',serif",fontSize:'1.55rem',color:'#e0f0fc',margin:'0 0 1.1rem'}}>Settings</h2>
    <div style={{display:'flex',gap:'.38rem',marginBottom:'1.1rem'}}>
      {[['clinic','Clinic Info'],['documents','Document Layout'],['backup','Backup']].map(([k,l])=><button key={k} onClick={()=>setTab(k)} style={{background:tab===k?'#14508a':'transparent',border:tab===k?'none':'1px solid #1e3650',borderRadius:7,padding:'.32rem .82rem',color:tab===k?'#fff':'#4a7090',cursor:'pointer',fontWeight:tab===k?700:400,fontSize:'.78rem'}}>{l}</button>)}
    </div>
    {tab==='clinic'&&<Card>
      <div style={{display:'flex',gap:'1.3rem',alignItems:'flex-start',marginBottom:'1.3rem'}}>
        <div>
          <div style={{color:'#4a7090',fontSize:'.67rem',textTransform:'uppercase',letterSpacing:'.08em',marginBottom:7}}>Clinic Logo</div>
          <div style={{width:96,height:96,borderRadius:14,border:'2px dashed #1e3650',overflow:'hidden',display:'flex',alignItems:'center',justifyContent:'center',background:'#060c16',cursor:editable?'pointer':'default'}} onClick={()=>editable&&logoRef.current.click()}>
            {s.logo?<img src={s.logo} style={{width:'100%',height:'100%',objectFit:'contain'}}/>:<div style={{color:'#2e4a60',textAlign:'center',fontSize:'.7rem'}}><Icon n="camera" s={26}/><div style={{marginTop:3}}>Upload</div></div>}
            <input ref={logoRef} type="file" accept="image/*" style={{display:'none'}} onChange={handleLogo}/>
          </div>
          {s.logo&&editable&&<button onClick={()=>upd({logo:null})} style={{background:'none',border:'none',color:'#4a7090',cursor:'pointer',fontSize:'.69rem',marginTop:4,display:'block'}}>Remove</button>}
        </div>
        <div style={{flex:1,display:'grid',gridTemplateColumns:'1fr 1fr',gap:'0 .75rem'}}>
          <div style={{gridColumn:'1/-1'}}><FI label="Clinic Name" value={s.clinicName} onChange={v=>upd({clinicName:v})} readOnly={!editable}/></div>
          <FI label="Tagline" value={s.tagline} onChange={v=>upd({tagline:v})} readOnly={!editable}/>
          <FI label="Phone" value={s.phone} onChange={v=>upd({phone:v})} readOnly={!editable}/>
          <FI label="Email" type="email" value={s.email} onChange={v=>upd({email:v})} readOnly={!editable}/>
          <div style={{gridColumn:'1/-1'}}><FI label="Address" value={s.address} onChange={v=>upd({address:v})} readOnly={!editable}/></div>
        </div>
      </div>
      {editable&&<div style={{color:'#38c878',fontSize:'.76rem',display:'flex',alignItems:'center',gap:5}}><Icon n="check" s={12}/>Settings auto-save to Firebase.</div>}
    </Card>}
    {tab==='documents'&&<Card>
      <div style={{color:'#4a7090',fontSize:'.67rem',textTransform:'uppercase',letterSpacing:'.08em',marginBottom:'1rem'}}>Invoice Layout</div>
      <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:'.65rem',marginBottom:'1.2rem'}}>
        {layouts.map(l=>(
          <div key={l.value} onClick={()=>editable&&upd({invoiceLayout:l.value})} style={{border:`2px solid ${s.invoiceLayout===l.value?'#14508a':'#1e3650'}`,borderRadius:12,padding:'.8rem',cursor:editable?'pointer':'default',background:s.invoiceLayout===l.value?'#0a1f35':'#060c16'}}>
            <div style={{color:s.invoiceLayout===l.value?'#4a90d9':'#e0f0fc',fontWeight:600,marginBottom:3}}>{l.label}</div>
            <div style={{color:'#4a7090',fontSize:'.72rem'}}>{l.desc}</div>
          </div>
        ))}
      </div>
      <G2>
        <div>
          <div style={{color:'#4a7090',fontSize:'.67rem',textTransform:'uppercase',letterSpacing:'.08em',marginBottom:7}}>Accent Color</div>
          <div style={{display:'flex',gap:'.5rem',alignItems:'center'}}>
            <input type="color" value={s.invoiceColor||'#1565a0'} onChange={e=>editable&&upd({invoiceColor:e.target.value})} style={{width:40,height:40,borderRadius:8,cursor:'pointer',border:'1px solid #1e3650',background:'none'}}/>
            <span style={{color:'#e0f0fc',fontSize:'.84rem',fontWeight:600}}>{s.invoiceColor||'#1565a0'}</span>
          </div>
        </div>
        <div>
          <div style={{color:'#4a7090',fontSize:'.67rem',textTransform:'uppercase',letterSpacing:'.08em',marginBottom:7}}>Logo on Documents</div>
          <label style={{display:'flex',alignItems:'center',gap:'.48rem',cursor:'pointer'}}>
            <input type="checkbox" checked={!!s.showLogoOnDocs} onChange={e=>editable&&upd({showLogoOnDocs:e.target.checked})}/>
            <span style={{color:'#e0f0fc',fontSize:'.84rem'}}>Show logo on printed PDFs</span>
          </label>
        </div>
      </G2>
      <FTA label="Invoice Footer Text" value={s.invoiceFooter} onChange={v=>editable&&upd({invoiceFooter:v})} rows={2}/>
      <FTA label="Receipt Footer Text" value={s.receiptFooter} onChange={v=>editable&&upd({receiptFooter:v})} rows={2}/>
    </Card>}
    {tab==='backup'&&<div>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'1rem',marginBottom:'1rem'}}>
        <Card><div style={{textAlign:'center',padding:'.5rem'}}>
          <div style={{color:'#4a90d9',marginBottom:8}}><Icon n="download" s={26}/></div>
          <div style={{color:'#e0f0fc',fontWeight:700,marginBottom:4}}>Export Backup</div>
          <div style={{color:'#4a7090',fontSize:'.74rem',marginBottom:'1rem'}}>Download all data as a JSON file</div>
          <Btn full icon="download" onClick={exportData}>Download Backup</Btn>
        </div></Card>
        <Card><div style={{textAlign:'center',padding:'.5rem'}}>
          <div style={{color:'#38c878',marginBottom:8}}><Icon n="upload" s={26}/></div>
          <div style={{color:'#e0f0fc',fontWeight:700,marginBottom:4}}>Import Data</div>
          <div style={{color:'#4a7090',fontSize:'.74rem',marginBottom:'1rem'}}>Restore from a previous backup</div>
          <Btn full success icon="upload" onClick={()=>importRef.current.click()}>Import Backup</Btn>
          <input ref={importRef} type="file" accept=".json" style={{display:'none'}} onChange={importData}/>
        </div></Card>
      </div>
      <Card>
        <div style={{color:'#4a7090',fontSize:'.67rem',textTransform:'uppercase',letterSpacing:'.08em',marginBottom:'1rem'}}>Data Summary</div>
        <div className="grid-3" style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:'.65rem'}}>
          {[['Patients',(db.patients||[]).length],['Invoices',(db.invoices||[]).length],['Appointments',(db.appointments||[]).length],['Receipts',(db.receipts||[]).length],['Bills',(db.bills||[]).length],['Expenses',(db.expenses||[]).length]].map(([k,v])=>(
            <div key={k} style={{background:'#060c16',borderRadius:8,padding:'.55rem .75rem'}}><div style={{color:'#2e4a60',fontSize:'.64rem',textTransform:'uppercase',marginBottom:2}}>{k}</div><div style={{color:'#e0f0fc',fontWeight:700}}>{v}</div></div>
          ))}
        </div>
        {editable&&<div style={{marginTop:'1rem',textAlign:'right'}}><Btn sm ghost danger onClick={()=>{if(window.confirm('RESET ALL DATA? This will delete everything from Firebase. Cannot be undone.'))setDb({...SEED,_ts:Date.now()});}}>Reset All Data</Btn></div>}
      </Card>
    </div>}
  </div>);
};

// ═══════════════════════════════════════════════════════════════════════════════
// ROOT APP — Firebase-first, no localStorage
// ═══════════════════════════════════════════════════════════════════════════════
function App(){
  // null = loading, object = loaded
  const[db,setDbRaw]=useState(null);
  const[currentUser,setCurrentUser]=useState(null);
  const[active,setActive]=useState('dashboard');
  const[syncing,setSyncing]=useState(false);
  const[loadStatus,setLoadStatus]=useState('Connecting to Firebase…');
  const[mobOpen,setMobOpen]=useState(false);

  // Track writes we triggered ourselves so we don't re-apply them as "remote"
  const pendingWrite=useRef(false);
  const saveTimer=useRef(null);
  const unsubRef=useRef(null);

  // ── On mount: load from Firebase, then subscribe ────────────────────────
  useEffect(()=>{
    let mounted=true;
    (async()=>{
      // Give the module script time to attach window.__fb
      await new Promise(r=>setTimeout(r,600));
      if(!window.__fb?.enabled){
        setLoadStatus('Firebase not available. Check your connection.');
        return;
      }
      try{
        setLoadStatus('Loading clinic data…');
        let data=await window.__fb.load();
        if(!data){
          setLoadStatus('Setting up clinic for first time…');
          data={...SEED,_ts:Date.now()};
          await window.__fb.save(data);
        }
        if(!mounted)return;
        const safe=safeDb(data);
        setDbRaw(safe);
        setLoadStatus('');

        // Subscribe to real-time updates from OTHER devices/tabs
        unsubRef.current=window.__fb.subscribe(incoming=>{
          if(pendingWrite.current)return; // ignore echo of our own write
          const cleaned=safeDb(incoming);
          setDbRaw(prev=>{
            if(!prev||(incoming._ts||0)>(prev._ts||0))return cleaned;
            return prev;
          });
        });
      }catch(e){
        console.error('Firebase load failed:',e);
        if(mounted)setLoadStatus('Failed to load data. Check Firebase rules and internet connection.');
      }
    })();
    return()=>{mounted=false;if(unsubRef.current)unsubRef.current();};
  },[]);

  // ── setDb: update state and save to Firebase ─────────────────────────────
  const setDb=useCallback(updFn=>{
    setDbRaw(prev=>{
      if(!prev)return prev;
      const next=typeof updFn==='function'?updFn(prev):updFn;
      const stamped={...next,_ts:Date.now()};
      // Debounced save to Firebase
      if(saveTimer.current)clearTimeout(saveTimer.current);
      pendingWrite.current=true;
      setSyncing(true);
      saveTimer.current=setTimeout(async()=>{
        await window.__fb?.save(stamped);
        setSyncing(false);
        // Allow a brief window then re-enable incoming updates
        setTimeout(()=>{pendingWrite.current=false;},500);
      },600);
      return stamped;
    });
  },[]);

  const can=useCallback(perm=>{
    if(!currentUser||!db)return false;
    const rp=db.rolePermissions||DEFAULT_PERMS;
    return(rp[currentUser.role]||[]).includes(perm);
  },[currentUser,db]);

  const closeMob=()=>setMobOpen(false);
  const navTo=k=>{setActive(k);closeMob();};

  // ── Still loading ────────────────────────────────────────────────────────
  if(!db) return <LoadingScreen status={loadStatus}/>;

  // ── Login ────────────────────────────────────────────────────────────────
  if(!currentUser) return <LoginScreen db={db} onLogin={setCurrentUser} fbStatus="online"/>;

  const allNav=[
    {k:'dashboard',label:'Dashboard',icon:'dash',perm:'view_dashboard'},
    {k:'patients',label:'Patients',icon:'patients',perm:'view_patients'},
    {k:'appointments',label:'Appointments',icon:'calendar',perm:'view_appointments'},
    {k:'history',label:'History',icon:'history',perm:'view_history'},
    {k:'prescriptions',label:'Prescriptions',icon:'rx',perm:'view_prescriptions'},
    null,
    {k:'invoices',label:'Invoices',icon:'invoice',perm:'view_invoices'},
    {k:'receipts',label:'Receipts',icon:'receipt',perm:'view_receipts'},
    {k:'bills',label:'Bills',icon:'bill',perm:'view_bills'},
    {k:'expenses',label:'Expenses',icon:'expense',perm:'view_expenses'},
    null,
    {k:'reports',label:'Reports',icon:'reports',perm:'view_reports'},
    null,
    {k:'doctors',label:'Doctors',icon:'doctors',perm:'view_doctors'},
    {k:'suppliers',label:'Suppliers',icon:'suppliers',perm:'view_suppliers'},
    {k:'users',label:'Users & Access',icon:'shield',perm:'view_users'},
    {k:'settings',label:'Settings',icon:'settings',perm:'view_settings'},
  ];
  const rp=db.rolePermissions||DEFAULT_PERMS;
  const nav=allNav.filter(n=>n===null||(rp[currentUser.role]||[]).includes(n.perm));
  const roleColors={admin:'#e8a030',doctor:'#4a90d9',accountant:'#38c878',receptionist:'#c084fc'};
  const pages={
    dashboard:<Dashboard db={db}/>,
    patients:<Patients db={db} setDb={setDb} can={can}/>,
    appointments:<Appointments db={db} setDb={setDb} can={can}/>,
    history:<History db={db} setDb={setDb} can={can}/>,
    prescriptions:<Prescriptions db={db} setDb={setDb} can={can}/>,
    invoices:<Invoices db={db} setDb={setDb} can={can}/>,
    receipts:<Receipts db={db} setDb={setDb} can={can}/>,
    bills:<Bills db={db} setDb={setDb} can={can}/>,
    expenses:<Expenses db={db} setDb={setDb} can={can}/>,
    reports:<Reports db={db}/>,
    doctors:<Doctors db={db} setDb={setDb} can={can}/>,
    suppliers:<Suppliers db={db} setDb={setDb} can={can}/>,
    users:<UsersPage db={db} setDb={setDb} currentUser={currentUser}/>,
    settings:<Settings db={db} setDb={setDb} can={can}/>,
  };
  const bnav=nav.filter(n=>n&&['dashboard','patients','appointments','invoices','reports'].includes(n.k)).slice(0,4);

  const SidebarContent=({mobile=false})=>(
    <>
      <div style={{padding:'1.05rem .88rem .85rem',borderBottom:'1px solid #1e3650',display:'flex',alignItems:'center',justifyContent:'space-between'}}>
        <div style={{display:'flex',alignItems:'center',gap:'.6rem'}}>
          {db.settings?.logo?<img src={db.settings.logo} style={{width:32,height:32,borderRadius:8,objectFit:'contain',background:'#14508a',padding:2,flexShrink:0}}/>:
            <div style={{width:32,height:32,background:'linear-gradient(135deg,#14508a,#0c3060)',borderRadius:8,display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}><Icon n="tooth" s={17}/></div>}
          <div><div style={{color:'#e0f0fc',fontFamily:"'Cormorant Garamond',serif",fontSize:'.87rem',fontWeight:700,lineHeight:1.1}}>{db.settings?.clinicName||'Dental Clinic'}</div><div style={{color:'#2e4a60',fontSize:'.57rem',marginTop:1}}>Management System</div></div>
        </div>
        {mobile&&<button onClick={closeMob} style={{background:'none',border:'none',color:'#4a7090',cursor:'pointer',padding:4}}><Icon n="close" s={18}/></button>}
      </div>
      <div style={{display:'flex',alignItems:'center',gap:6,padding:'.42rem .88rem',background:'#060c16',borderBottom:'1px solid #1e3650',fontSize:'.66rem',color:syncing?'#e8a030':'#38c878'}}>
        <Icon n={syncing?'sync':'wifi'} s={11} className={syncing?'syncing':''}/>
        {syncing?'Saving…':'☁ Firebase Live'}
      </div>
      <nav style={{flex:1,padding:'.6rem .52rem',overflowY:'auto'}}>
        {nav.map((n,i)=>n===null?<div key={i} style={{height:1,background:'#1e3650',margin:'.32rem 0'}}/>:(
          <button key={n.k} onClick={()=>navTo(n.k)}
            style={{width:'100%',display:'flex',alignItems:'center',gap:'.52rem',padding:'.48rem .7rem',borderRadius:8,border:'none',background:active===n.k?'#14508a':'transparent',color:active===n.k?'#fff':'#4a7090',cursor:'pointer',fontSize:'.8rem',fontWeight:active===n.k?700:400,marginBottom:1,textAlign:'left',transition:'all .12s',minHeight:38}}
            onMouseEnter={e=>{if(active!==n.k)e.currentTarget.style.background='#0c1c2e'}}
            onMouseLeave={e=>{if(active!==n.k)e.currentTarget.style.background='transparent'}}>
            <Icon n={n.icon} s={14}/>{n.label}
          </button>
        ))}
      </nav>
      <div style={{padding:'.62rem .72rem',borderTop:'1px solid #1e3650'}}>
        <div style={{display:'flex',alignItems:'center',gap:'.52rem',marginBottom:'.52rem'}}>
          <div style={{width:28,height:28,borderRadius:'50%',background:`linear-gradient(135deg,${roleColors[currentUser.role]||'#4a7090'}44,${roleColors[currentUser.role]||'#4a7090'}22)`,border:`1.5px solid ${roleColors[currentUser.role]||'#4a7090'}55`,display:'flex',alignItems:'center',justifyContent:'center',color:roleColors[currentUser.role]||'#4a7090',fontWeight:700,fontSize:'.88rem',flexShrink:0}}>{currentUser.name.charAt(0)}</div>
          <div style={{overflow:'hidden',flex:1}}>
            <div style={{color:'#e0f0fc',fontSize:'.74rem',fontWeight:600,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{currentUser.name.split(' ')[0]}</div>
            <div style={{color:roleColors[currentUser.role]||'#4a7090',fontSize:'.6rem',textTransform:'capitalize'}}>{currentUser.role}</div>
          </div>
        </div>
        <button onClick={()=>setCurrentUser(null)} style={{width:'100%',background:'transparent',border:'1px solid #1e3650',borderRadius:7,padding:'.38rem',color:'#4a7090',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',gap:5,fontSize:'.72rem'}}>
          <Icon n="logout" s={11}/>Sign Out
        </button>
      </div>
    </>
  );

  return(<div className="app-shell">
    {/* Desktop sidebar — sticky, full height, fills column */}
    <aside className="sidebar-desktop">
      <SidebarContent/>
    </aside>

    {/* Mobile overlay + drawer */}
    <div className={'mob-overlay'+(mobOpen?' open':'')} onClick={closeMob}/>
    <aside className={'sidebar-mobile'+(mobOpen?' open':'')}>
      <SidebarContent mobile/>
    </aside>

    {/* Right column — stretches to fill all remaining space */}
    <div className="main-col">
      {/* Mobile top bar */}
      <div className="mob-header">
        <button onClick={()=>setMobOpen(true)} style={{background:'none',border:'none',color:'#e0f0fc',cursor:'pointer',padding:4,display:'flex'}}><Icon n="menu" s={22}/></button>
        <span style={{fontFamily:"'Cormorant Garamond',serif",color:'#e0f0fc',fontSize:'1.05rem',fontWeight:700}}>{db.settings?.clinicName||'Dental Clinic'}</span>
        <div style={{color:syncing?'#e8a030':'#38c878',display:'flex',alignItems:'center',gap:4,fontSize:'.7rem'}}>
          <Icon n={syncing?'sync':'wifi'} s={13} className={syncing?'syncing':''}/>
        </div>
      </div>

      {/* Page content */}
      <main className="main-content">
        {pages[active]||<div style={{color:'#2e4a60',textAlign:'center',padding:'4rem'}}>Select a section.</div>}
      </main>
    </div>

    {/* Mobile bottom nav */}
    <nav className="bottom-nav">
      {bnav.map(n=>(
        <button key={n.k} className={'bottom-nav-item'+(active===n.k?' active':'')} onClick={()=>navTo(n.k)}>
          <Icon n={n.icon} s={20}/><span>{n.label}</span>
        </button>
      ))}
      <button className="bnav-more" onClick={()=>setMobOpen(true)}>
        <Icon n="menu" s={20}/><span style={{fontSize:'.6rem',fontWeight:600}}>More</span>
      </button>
    </nav>
  </div>);
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
